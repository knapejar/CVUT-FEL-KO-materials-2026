<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level (Muntz &amp; Coffman) — immersive video · KO Hitovky</title>
<style>
  :root {
    --bg: #07090f;
    --panel: #11141d;
    --text: #e8eaf0;
    --muted: #8b93a7;
    --accent: #ffb000;
    --border: #232a3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; overflow: hidden;
  }
  #topbar {
    width: 100%; display: flex; align-items: center; gap: 12px;
    padding: 10px 18px; font-size: 13px; color: var(--muted);
  }
  #topbar a { color: var(--muted); text-decoration: none; }
  #topbar a:hover { color: var(--accent); }
  #topbar .title { color: var(--text); font-weight: 700; }
  #topbar .badge {
    font-size: 11px; color: var(--bg); background: var(--accent);
    border-radius: 10px; padding: 2px 9px; font-weight: 700;
  }
  #stagewrap {
    flex: 1; width: 100%; display: flex; align-items: center; justify-content: center;
    min-height: 0; padding: 0 16px;
  }
  #stage {
    position: relative;
    width: min(96vw, calc((100vh - 150px) * 16 / 9));
    aspect-ratio: 16 / 9;
    background: #0b0e16; border-radius: 12px; overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
  }
  #stage canvas { position: absolute; inset: 0; width: 100% !important; height: 100% !important; }
  /* ── karaoke pruh přes video, zarovnaný odspodu ── */
  #subtitle {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 26px 4% 16px;
    background: linear-gradient(to top, rgba(5,7,12,0.88) 0%, rgba(5,7,12,0.55) 65%, transparent 100%);
    text-align: center; pointer-events: none;
    font-size: clamp(15px, 2.6vw, 30px); font-weight: 700; line-height: 1.4;
    color: #fff;
  }
  #subtitle .m {
    font-family: 'Cambria Math', Cambria, Georgia, serif; font-style: italic;
    color: #7dd3fc;
  }
  #subtitle .hl {
    font-family: 'Cambria Math', Cambria, Georgia, serif; font-style: italic;
    padding: 0 4px; border-radius: 5px;
  }
  #subtitle .c1 { background: rgba(125,211,252,0.15); color: #7dd3fc; }
  #subtitle .c2 { background: rgba(251,191,36,0.15);  color: #fbbf24; }
  #subtitle .c3 { background: rgba(167,139,250,0.18); color: #c4b5fd; }
  #subtitle .c4 { background: rgba(52,211,153,0.15);  color: #4ade80; }
  #subtitle .c5 { background: rgba(244,114,182,0.16); color: #f9a8d4; }
  #subtitle .c6 { background: rgba(251,146,60,0.17);  color: #fdba74; }
  #subtitle .c7 { background: rgba(147,197,253,0.16); color: #93c5fd; }
  .kw { position: relative; display: inline-block; white-space: nowrap; }
  .kw .wb { opacity: 0.42; text-shadow: 0 2px 10px rgba(0,0,0,0.9); }
  .kw .wf {
    position: absolute; left: 0; top: 0; width: 0%;
    overflow: hidden; white-space: nowrap;
    text-shadow: 0 0 16px rgba(255,176,0,0.85), 0 2px 10px rgba(0,0,0,0.95);
  }
  .kw .wf, .kw .wf * { color: #ffd34d !important; }
  #bigplay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(5,7,12,0.55); cursor: pointer; z-index: 5;
    flex-direction: column; gap: 18px;
  }
  #bigplay.hidden { display: none; }
  #bigplay .pbtn {
    width: 110px; height: 110px; border-radius: 50%;
    background: var(--accent); color: #1a1200;
    display: flex; align-items: center; justify-content: center;
    font-size: 44px; box-shadow: 0 0 60px rgba(255,176,0,0.45);
    transition: transform .15s;
  }
  #bigplay:hover .pbtn { transform: scale(1.08); }
  #bigplay .hint { color: var(--text); font-size: 15px; font-weight: 600; text-shadow: 0 2px 8px #000; }
  #bigplay .hint small { display: block; color: var(--muted); font-weight: 400; margin-top: 6px; }
  #controls {
    width: min(96vw, calc((100vh - 150px) * 16 / 9));
    display: flex; align-items: center; gap: 12px;
    padding: 12px 4px 16px;
  }
  #controls button {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    width: 42px; height: 42px; border-radius: 50%; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: border-color .15s, color .15s;
  }
  #controls button:hover { border-color: var(--accent); color: var(--accent); }
  #seek {
    flex: 1; -webkit-appearance: none; appearance: none; height: 6px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--p, 0%), #2a3040 var(--p, 0%));
    border-radius: 3px; outline: none; cursor: pointer;
  }
  #seek::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 10px rgba(255,176,0,0.6); cursor: pointer;
  }
  #seek::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%; border: none;
    background: var(--accent); cursor: pointer;
  }
  .time { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 44px; text-align: center; }
  @media (max-height: 560px) { #topbar { display: none; } }
</style>
</head>
<body>

<div id="topbar">
  <a href="pisnicky.html">← Zpěvník</a>
  <span class="title">Level (Muntz &amp; Coffman)</span>
  <span class="badge">IMMERSIVE VIDEO</span>
  <span style="margin-left:auto">mezerník = play/pauza · ←/→ = ±5 s · R = od začátku</span>
</div>

<div id="stagewrap">
  <div id="stage">
    <div id="subtitle"></div>
    <div id="bigplay">
      <div class="pbtn">▶</div>
      <div class="hint">Muntz &amp; Coffman — levely, sdílení procesorů &amp; McNaughton<small>2 min 57 s · zpívaná videolekce</small></div>
    </div>
  </div>
</div>

<div id="controls">
  <button id="btnPlay" title="Play / pauza">▶</button>
  <button id="btnRestart" title="Od začátku">⟲</button>
  <span class="time" id="tCur">0:00</span>
  <input type="range" id="seek" min="0" max="177.3" step="0.01" value="0">
  <span class="time" id="tDur">2:57</span>
</div>

<audio id="player" src="audio/procesory-hanulo.mp3" preload="auto"></audio>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.3/dist/pixi.min.js"></script>
<script>
(async function () {
'use strict';

// ════════════════════════════════════════════════════════════════════
// 0) COLORS + helpers
// ════════════════════════════════════════════════════════════════════
const C = {
  bg: 0x0b0e16, gold: 0xffb000, goldHi: 0xffd34d, green: 0x4ade80,
  pink: 0xf472b6, cyan: 0x7dd3fc, violet: 0xa78bfa, white: 0xffffff,
  dim: 0x37415a, muted: 0x8b93a7, red: 0xef4444, card: 0x141927,
};
const clamp01 = v => Math.max(0, Math.min(1, v));
const lerp = (a, b, t) => a + (b - a) * t;
const easeOut = t => 1 - Math.pow(1 - clamp01(t), 3);
const ph = (t, a, b) => clamp01((t - a) / (b - a));

// ════════════════════════════════════════════════════════════════════
// 1) INSTANCE + REAL M&C RUN (ručně ověřený trace)
//    R=2; A(2)→C, B(3)→C, C(3)→F, D(4)→F, E(3) volná
//    levely: B=8, A=7, D=6, C=5, E=3, F=2
// ════════════════════════════════════════════════════════════════════
const TASKS = {
  A: { p: 2, lvl: 7, x: 200, y: 380, col: 0x7dd3fc },
  B: { p: 3, lvl: 8, x: 200, y: 190, col: 0xfbbf24 },
  C: { p: 3, lvl: 5, x: 500, y: 285, col: 0x4ade80 },
  D: { p: 4, lvl: 6, x: 470, y: 500, col: 0xf472b6 },
  E: { p: 3, lvl: 3, x: 880, y: 500, col: 0xc4b5fd },
  F: { p: 2, lvl: 2, x: 800, y: 330, col: 0xfdba74 },
};
const PREC = [['A', 'C'], ['B', 'C'], ['C', 'F'], ['D', 'F']];
// segmenty procesor-sharing běhu (kdo běží jakou rychlostí β)
const SEGS = [
  { t0: 0,   t1: 1,   run: { B: 1, A: 1 },                lbl: 'top-2 levely: B, A' },
  { t0: 1,   t1: 3,   run: { B: 1, A: 0.5, D: 0.5 },      lbl: 'A klesla na D → sdílí β=½' },
  { t0: 3,   t1: 5,   run: { C: 1, D: 1 },                lbl: 'A,B hotovo → C,D' },
  { t0: 5,   t1: 6.5, run: { C: 2/3, D: 2/3, E: 2/3 },    lbl: '3 úlohy / 2 stroje → β=⅔' },
  { t0: 6.5, t1: 8.5, run: { E: 1, F: 1 },                lbl: 'C,D hotovo → E,F' },
];
const CMAX = 8.5;
// δ události pro V2
const EVENTS = [
  { t: 1,   kind: 2, lbl: 'δ: level(A) klesl na level(D)' },
  { t: 3,   kind: 1, lbl: 'δ: A i B doběhly' },
  { t: 5,   kind: 2, lbl: 'δ: levely C,D klesly na E' },
  { t: 6.5, kind: 1, lbl: 'δ: C i D doběhly' },
];
// polyline levelů v čase (pro level-decay graf)
const LVLLINES = {
  B: [[0, 8], [3, 5]],
  A: [[0, 7], [1, 6], [3, 5]],
  D: [[0, 6], [1, 6], [3, 5], [5, 3], [6.5, 2]],
  C: [[0, 5], [3, 5], [5, 3], [6.5, 2]],
  E: [[0, 3], [5, 3], [6.5, 2], [8.5, 0]],
  F: [[0, 2], [6.5, 2], [8.5, 0]],
};

// ════════════════════════════════════════════════════════════════════
// 2) PIXI SETUP
// ════════════════════════════════════════════════════════════════════
const app = new PIXI.Application({ width: 1280, height: 720, antialias: true, background: C.bg });
document.getElementById('stage').appendChild(app.view);
const starLayer = new PIXI.Container();
const sceneLayer = new PIXI.Container();
const fxLayer = new PIXI.Container();
app.stage.addChild(starLayer, sceneLayer, fxLayer);

const dotG = new PIXI.Graphics();
dotG.beginFill(0xffffff, 1).drawCircle(0, 0, 32).endFill();
const dotTex = app.renderer.generateTexture(dotG);
const stars = [];
for (let i = 0; i < 70; i++) {
  const s = new PIXI.Sprite(dotTex);
  s.anchor.set(0.5);
  s.x = Math.random() * 1280; s.y = Math.random() * 720;
  s.scale.set(0.015 + Math.random() * 0.035);
  s.alpha = 0.12 + Math.random() * 0.25;
  s.tint = Math.random() < 0.25 ? C.gold : 0x9fb4ff;
  s._vy = 2 + Math.random() * 6; s._tw = Math.random() * 6.28;
  starLayer.addChild(s); stars.push(s);
}
const parts = [];
function burst(x, y, tint, count = 18, speed = 220, size = 0.1) {
  for (let i = 0; i < count; i++) {
    const p = new PIXI.Sprite(dotTex);
    p.anchor.set(0.5); p.x = x; p.y = y; p.tint = tint;
    p.blendMode = PIXI.BLEND_MODES.ADD;
    const a = Math.random() * 6.283, v = speed * (0.3 + Math.random() * 0.8);
    p._vx = Math.cos(a) * v; p._vy = Math.sin(a) * v;
    p._life = 0.6 + Math.random() * 0.7; p._t = 0;
    p.scale.set(size * (0.5 + Math.random()));
    fxLayer.addChild(p); parts.push(p);
  }
}
app.ticker.add(() => {
  const dt = app.ticker.deltaMS / 1000;
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p._t += dt; p.x += p._vx * dt; p.y += p._vy * dt;
    p._vy += 220 * dt; p.alpha = clamp01(1 - p._t / p._life);
    if (p._t > p._life) { fxLayer.removeChild(p); p.destroy(); parts.splice(i, 1); }
  }
  for (const s of stars) {
    s.y += s._vy * dt; s._tw += dt * 2;
    s.alpha = 0.1 + 0.18 * (0.5 + 0.5 * Math.sin(s._tw));
    if (s.y > 730) { s.y = -10; s.x = Math.random() * 1280; }
  }
});
function txt(str, size, color, weight = '800', family = "'Segoe UI', system-ui, sans-serif") {
  const t = new PIXI.Text(str, {
    fontFamily: family, fontSize: size, fill: color, fontWeight: weight,
    align: 'center', dropShadow: true, dropShadowColor: 0x000000,
    dropShadowBlur: 8, dropShadowAlpha: 0.6, dropShadowDistance: 2,
  });
  t.anchor.set(0.5); t.resolution = 2;
  return t;
}
const MATH = "'Cambria Math', Cambria, Georgia, serif";
function arrow(g, A, B, width, color, alpha, shrink = 34) {
  const dx = B.x - A.x, dy = B.y - A.y, len = Math.hypot(dx, dy);
  const ux = dx / len, uy = dy / len;
  const sx = A.x + ux * shrink, sy = A.y + uy * shrink;
  const ex = B.x - ux * shrink, ey = B.y - uy * shrink;
  g.lineStyle(width, color, alpha);
  g.moveTo(sx, sy); g.lineTo(ex, ey);
  const hs = 10 + width;
  g.lineStyle(0);
  g.beginFill(color, alpha);
  g.moveTo(ex, ey);
  g.lineTo(ex - ux * hs - uy * hs * 0.55, ey - uy * hs + ux * hs * 0.55);
  g.lineTo(ex - ux * hs + uy * hs * 0.55, ey - uy * hs - ux * hs * 0.55);
  g.closePath().endFill();
}

// ── DAG renderer (level badges per reveal time map) ──
function buildDAG(c, scale = 1, ox = 0, oy = 0) {
  const wrap = new PIXI.Container(); wrap.scale.set(scale); wrap.x = ox; wrap.y = oy; c.addChild(wrap);
  const g = new PIXI.Graphics(); wrap.addChild(g);
  const nameT = {}, pT = {}, lvlT = {};
  for (const [id, T] of Object.entries(TASKS)) {
    nameT[id] = txt(id, 26, 0x0b0e16, '900'); nameT[id].x = T.x; nameT[id].y = T.y; wrap.addChild(nameT[id]);
    pT[id] = txt('p=' + T.p, 17, C.muted, '700', MATH); pT[id].x = T.x; pT[id].y = T.y + 50; wrap.addChild(pT[id]);
    lvlT[id] = txt('level ' + T.lvl, 20, C.goldHi, '900', MATH); lvlT[id].x = T.x; lvlT[id].y = T.y - 52; lvlT[id].alpha = 0; wrap.addChild(lvlT[id]);
  }
  function render(t, opts = {}) {
    g.clear();
    for (const [a, b] of PREC) {
      const hl = opts.pathHL && opts.pathHL.includes(a + b);
      arrow(g, TASKS[a], TASKS[b], hl ? 6 : 3.5, hl ? C.goldHi : C.dim, 0.95);
    }
    for (const [id, T] of Object.entries(TASKS)) {
      const rv = opts.reveal ? clamp01(opts.reveal[id] === undefined ? 1 : ph(t, opts.reveal[id], opts.reveal[id] + 0.5)) : 1;
      g.lineStyle(0);
      g.beginFill(0x0b0e16, 1).drawCircle(T.x, T.y, 33).endFill();
      g.beginFill(T.col, 1).drawCircle(T.x, T.y, 30).endFill();
      lvlT[id].alpha = rv;
      lvlT[id].scale.set(lerp(1.7, 1, easeOut(rv)));
    }
  }
  return { wrap, render, lvlT };
}

// ── Gantt renderer (processor-sharing bands up to simT) ──
const GX0 = 250, GX1 = 1060, GY0 = 470, ROWH = 62;
const gx = u => GX0 + (GX1 - GX0) * u / CMAX;
function buildGantt(c) {
  const g = new PIXI.Graphics(); c.addChild(g);
  const lbls = new PIXI.Container(); c.addChild(lbls);
  const p1 = txt('P1', 20, C.muted, '800'); p1.x = GX0 - 36; p1.y = GY0 + ROWH / 2; lbls.addChild(p1);
  const p2 = txt('P2', 20, C.muted, '800'); p2.x = GX0 - 36; p2.y = GY0 + ROWH * 1.5 + 8; lbls.addChild(p2);
  const made = new Set();
  function render(simT, t, opts = {}) {
    g.clear();
    // axis + ticks
    g.lineStyle(2, C.dim, 1);
    g.moveTo(GX0, GY0 + 2 * ROWH + 16); g.lineTo(GX1, GY0 + 2 * ROWH + 16);
    for (let u = 0; u <= 8; u++) {
      g.moveTo(gx(u), GY0 + 2 * ROWH + 12); g.lineTo(gx(u), GY0 + 2 * ROWH + 20);
    }
    // bands per segment (vertical split podle β — sdílení je vidět jako tenčí pruhy)
    for (const seg of SEGS) {
      const sT = Math.min(simT, seg.t1);
      if (sT <= seg.t0) break;
      let yOff = 0;
      for (const [id, beta] of Object.entries(seg.run)) {
        const h = 2 * ROWH * (beta / 2); // celkem 2 procesory výšky
        const x0 = gx(seg.t0), x1 = gx(sT);
        g.lineStyle(1, 0x0b0e16, 1);
        g.beginFill(TASKS[id].col, 0.92);
        g.drawRect(x0, GY0 + yOff, x1 - x0, h - 2);
        g.endFill();
        // task letter once segment wide enough
        const key = seg.t0 + id;
        if (x1 - x0 > 30 && !made.has(key)) {
          made.add(key);
          const tt = txt(id + (beta < 1 ? ' β=' + (beta === 0.5 ? '½' : '⅔') : ''), 16, 0x0b0e16, '900');
          tt.x = (x0 + gx(seg.t1)) / 2; tt.y = GY0 + yOff + h / 2;
          lbls.addChild(tt);
        }
        yOff += h;
      }
    }
    // event markers
    if (opts.marks) for (const ev of EVENTS) {
      if (ev.t > simT + 0.01) continue;
      const on = opts.flashKind === ev.kind;
      const a = on ? 0.55 + 0.45 * Math.sin(t * 8) : 0.5;
      g.lineStyle(on ? 4 : 2, ev.kind === 1 ? C.green : C.violet, a);
      g.moveTo(gx(ev.t), GY0 - 8); g.lineTo(gx(ev.t), GY0 + 2 * ROWH + 8);
    }
    // cursor
    if (simT < CMAX - 0.01) {
      g.lineStyle(3, C.goldHi, 1);
      g.moveTo(gx(simT), GY0 - 12); g.lineTo(gx(simT), GY0 + 2 * ROWH + 12);
      g.beginFill(C.goldHi, 1).drawCircle(gx(simT), GY0 - 16, 6).endFill();
    }
  }
  return { render };
}

// ════════════════════════════════════════════════════════════════════
// 3) SCENES
// ════════════════════════════════════════════════════════════════════
const scenes = [];
function scene(t0, t1, build) {
  const s = { t0, t1, st: null };
  s.init = () => { s.st = build(); sceneLayer.addChild(s.st.c); };
  s.update = (lt) => s.st && s.st.update(lt);
  s.destroy = () => { if (s.st) { sceneLayer.removeChild(s.st.c); s.st.c.destroy({ children: true }); s.st = null; } };
  scenes.push(s);
  return s;
}
function caption(c, str, color = C.gold, y = 46, size = 27) {
  const t = txt(str, size, color, '800');
  t.x = 640; t.y = y; c.addChild(t);
  return t;
}
function makeC() { const c = new PIXI.Container(); const g = new PIXI.Graphics(); c.addChild(g); return { c, g }; }

// ── INTRO [0 – 26] ──
scene(0, 26.0, () => {
  const { c, g } = makeC();
  const t1 = txt('MUNTZ & COFFMAN', 76, C.gold, '900'); t1.x = 640; t1.y = 170; t1.alpha = 0;
  const t2 = txt('LEVEL SCHEDULING', 38, 0xdfe6f5, '800'); t2.x = 640; t2.y = 252; t2.alpha = 0;
  const t3 = txt('P | pmtn, prec | C·max', 30, C.cyan, '800', MATH); t3.x = 640; t3.y = 316; t3.alpha = 0;
  c.addChild(t1, t2, t3);
  const dag = buildDAG(c, 0.62, 230, 130);
  dag.wrap.alpha = 0;
  let fired = new Set();
  return { c, update(lt) {
    t1.alpha = easeOut(ph(lt, 0.5, 1.6));
    t1.scale.set(lerp(1.4, 1, easeOut(ph(lt, 0.5, 1.8))) * (1 + 0.04 * Math.max(0, Math.sin(lt * 9))));
    t2.alpha = easeOut(ph(lt, 2.2, 3.2));
    t3.alpha = easeOut(ph(lt, 3.8, 4.8));
    if (lt > 0.6 && !fired.has('t')) { fired.add('t'); burst(640, 170, C.gold, 30, 300, 0.13); }
    // beat pulses (DnB!)
    const beat = Math.floor(lt * 2.9);
    if (lt > 6 && lt < 24 && !fired.has('b' + beat) && beat % 4 === 0) {
      fired.add('b' + beat);
      burst(160 + (beat * 137) % 960, 620, [C.cyan, C.pink, C.violet][beat % 3], 8, 160, 0.07);
    }
    const shift = easeOut(ph(lt, 9, 11));
    t1.y = lerp(170, 70, shift); t1.scale.set(lerp(1, 0.5, shift));
    t2.alpha *= (1 - shift); t3.y = lerp(316, 118, shift);
    dag.wrap.alpha = easeOut(ph(lt, 10, 13));
    dag.render(lt, { reveal: { A: 1e9, B: 1e9, C: 1e9, D: 1e9, E: 1e9, F: 1e9 } });
    g.clear();
  } };
});

// ── VERSE 1: LEVELY ODZADU [26 – 37.44] ──

// ── CHORUS factory: hesla + živý Gantt / level-graf ──
// an = { top, beta, delta, mcn } word anchors
function chorusScene(t0, t1, an, mode) {
  scene(t0, t1, () => {
    const { c, g } = makeC();
    const w1 = txt('NEJVYŠŠÍ LEVEL bere procesory!', 40, C.gold, '900'); w1.x = 640; w1.y = 70; w1.alpha = 0;
    const w2 = txt('β = h / |S|', 52, 0xfbbf24, '900', MATH); w2.x = 250, w2.y = 150; w2.alpha = 0;
    const w3 = txt('δ: SKONČÍ · KLESNE · DOHÁNÍ', 32, C.violet, '900'); w3.x = 750; w3.y = 150; w3.alpha = 0;
    const w4 = txt('…a McNAUGHTON to srovná!', 34, C.green, '900'); w4.x = 640; w4.y = 215; w4.alpha = 0;
    c.addChild(w1, w2, w3, w4);
    let gantt = null, dagMini = null;
    if (mode === 'gantt') gantt = buildGantt(c);
    if (mode === 'levels') {
      // level-decay graf — ikonický M&C obrázek
      const lg = new PIXI.Graphics(); c.addChild(lg);
      const LX0 = 280, LX1 = 1030, LY0 = 620, LYS = 38; // level 0..8
      const lx = u => LX0 + (LX1 - LX0) * u / CMAX;
      const ly = l => LY0 - l * LYS;
      const axisT = txt('level(úlohy) v čase — kde se čáry potkají, tam se sdílí', 19, C.muted, '600');
      axisT.x = 640; axisT.y = 648; c.addChild(axisT);
      gantt = { render(simT, t) {
        lg.clear();
        lg.lineStyle(2, C.dim, 0.8);
        lg.moveTo(LX0, LY0); lg.lineTo(LX1, LY0);
        lg.moveTo(LX0, LY0); lg.lineTo(LX0, ly(8.4));
        for (const [id, pts] of Object.entries(LVLLINES)) {
          lg.lineStyle(4, TASKS[id].col, 0.95);
          let started = false;
          for (let i = 0; i < pts.length; i++) {
            const [u, l] = pts[i];
            if (u > simT) {
              // partial segment
              if (i > 0) {
                const [u0, l0] = pts[i - 1];
                const f = ph(simT, u0, u);
                lg.lineTo(lx(lerp(u0, u, f)), ly(lerp(l0, l, f)));
              }
              break;
            }
            if (!started) { lg.moveTo(lx(u), ly(l)); started = true; }
            else lg.lineTo(lx(u), ly(l));
          }
        }
      } };
    }
    const fired = new Set();
    return { c, update(lt0) {
      const lt = lt0 + t0;
      w1.alpha = lt > an.top ? 1 : 0;
      w2.alpha = lt > an.beta ? 1 : 0;
      w3.alpha = lt > an.delta ? 1 : 0;
      w4.alpha = lt > an.mcn ? 1 : 0;
      w1.scale.set(1 + 0.04 * Math.sin(lt * 6) * w1.alpha);
      w2.scale.set(lerp(1.5, 1, easeOut(ph(lt, an.beta, an.beta + 0.4))));
      [['t', an.top, w1, C.gold], ['b', an.beta, w2, 0xfbbf24], ['d', an.delta, w3, C.violet], ['m', an.mcn, w4, C.green]].forEach(([k, at, el, col]) => {
        if (lt > at && !fired.has(k)) { fired.add(k); burst(el.x, el.y, col, 22, 260, 0.11); }
      });
      g.clear();
      if (gantt) {
        // simulace jede přes refrén: simT 0→8.5
        const simT = ph(lt, t0 + 0.8, t1 - 3.5) * CMAX;
        gantt.render(simT, lt, { marks: true });
      }
    } };
  });
}

// ── BRIDGE: McNAUGHTON — KOBEREC [102.58 – 125.26] ──
scene(102.58, 125.26, () => {
  const { c, g } = makeC();
  const cap = caption(c, 'McNaughton: P | pmtn | C·max — namotávání', C.green);
  const f1 = txt('C·max = max( max pⱼ ,  Σpⱼ / R )', 42, C.green, '900', MATH); f1.x = 640; f1.y = 130; f1.alpha = 0;
  const f2 = txt('p = (3, 4, 5), R = 2:  C· = max(5, 12/2) = 6', 28, C.cyan, '800', MATH); f2.x = 640; f2.y = 190; f2.alpha = 0;
  const noteT = txt('úloha 2 se zlomila PRÁVĚ JEDNOU — víc nikdy netřeba · O(n)', 24, C.goldHi, '800'); noteT.x = 640; noteT.y = 640; noteT.alpha = 0;
  c.addChild(f1, f2, noteT);
  // koberec: pás úloh [3][4][5] se namotá na 2 řádky šířky 6
  const MX0 = 320, MW = 640, MY = 300, MH = 70, unit = MW / 6;
  const pieces = [
    { id: '1', len: 3, col: 0x7dd3fc }, { id: '2', len: 4, col: 0xf472b6 }, { id: '3', len: 5, col: 0x4ade80 },
  ];
  const fired = new Set();
  return { c, update(lt0) {
    const lt = lt0 + 102.58;
    g.clear();
    f1.alpha = easeOut(ph(lt, 103.4, 104.4));
    f1.scale.set(1 + 0.03 * Math.sin(lt * 5) * f1.alpha);
    f2.alpha = easeOut(ph(lt, 108.4, 109.4));
    if (lt > 103.5 && !fired.has('f1')) { fired.add('f1'); burst(640, 130, C.green, 24, 260, 0.12); }
    // rows
    const rowsOn = easeOut(ph(lt, 110, 111));
    if (rowsOn > 0) {
      for (let r = 0; r < 2; r++) {
        g.lineStyle(2, C.dim, rowsOn);
        g.beginFill(C.card, 0.6 * rowsOn);
        g.drawRect(MX0, MY + r * (MH + 18), MW, MH);
        g.endFill();
      }
      // wrap progress: total strip 12 units rolls on [113.5, 120.5]
      const wp = ph(lt, 113.5, 120.5) * 12;
      let off = 0;
      for (const pc of pieces) {
        const drawn = clamp01((wp - off) / pc.len) * pc.len;
        let d0 = off, d1 = off + drawn;
        // split into rows at 6
        for (const [r0, r1, row] of [[Math.min(d0, 6), Math.min(d1, 6), 0], [Math.max(d0, 6), Math.max(d1, 6), 1]]) {
          if (r1 <= r0) continue;
          const x0 = MX0 + (r0 - row * 6) * unit, x1 = MX0 + (r1 - row * 6) * unit;
          g.lineStyle(2, 0x0b0e16, 1);
          g.beginFill(pc.col, 0.95);
          g.drawRect(x0, MY + row * (MH + 18), x1 - x0, MH);
          g.endFill();
        }
        off += pc.len;
      }
      // break marker for piece 2 (crosses 6)
      if (wp >= 7 && lt < 125) {
        g.lineStyle(4, C.red, 0.5 + 0.5 * Math.sin(lt * 6));
        g.moveTo(MX0 + MW, MY - 8); g.lineTo(MX0 + MW, MY + MH + 8);
        if (!fired.has('br')) { fired.add('br'); burst(MX0 + MW, MY + MH / 2, C.red, 18, 220, 0.1); }
      }
    }
    noteT.alpha = easeOut(ph(lt, 118.6, 119.6));
    if (lt > 121.4) { cap.text = 'každá úloha zlomená nejvýš 1× → McNaughton je O(n)'; cap.style.fill = C.goldHi; }
  } };
});

  [131.26, 134.06, `Jinak aproximace: ${H('c6', '2 − 2/R')} —`],
  [134.06, 136.56, `Muntz a Coffman, ${H('c7', 'O(n²)')}, tref se a ber!`],
  // Chorus 3
  [136.56, 144.0, CH1L],
  [144.0, 148.86, CH2L],
  [148.86, 152.31, CH3L],
  [152.31, 158.64, CH4L],
  // Outro
  [158.64, 161.5, `Hey!`],
  [171.4, 173.0, `Hey!`],
];

// ════════════════════════════════════════════════════════════════════
// 5) PLAYER / KARAOKE / CONTROLS
// ════════════════════════════════════════════════════════════════════
const player = document.getElementById('player');
const subEl = document.getElementById('subtitle');
const bigplay = document.getElementById('bigplay');
const btnPlay = document.getElementById('btnPlay');
const btnRestart = document.getElementById('btnRestart');
const seek = document.getElementById('seek');
const tCur = document.getElementById('tCur');
const tDur = document.getElementById('tDur');

let curScene = null, lastLocal = -1, curLine = -1;
let lineWords = [];
function tokenize(html) {
  const out = []; let cur = ''; let inTag = false;
  for (const ch of html) {
    if (ch === '<') inTag = true;
    else if (ch === '>') inTag = false;
    if (ch === ' ' && !inTag) { if (cur) out.push(cur); cur = ''; }
    else cur += ch;
  }
  if (cur) out.push(cur);
  return out;
}
function buildKaraokeLine(li) {
  const [a, b, html] = LINES[li];
  const tokens = tokenize(html);
  const ww = SUNG.filter(w => w[0] >= a - 0.06 && w[0] < b && w[1] > w[0]);
  const pick = (i) => {
    if (!ww.length) {
      const step = (b - a) / tokens.length;
      return [a + step * i, a + step * (i + 1)];
    }
    const wi = tokens.length === 1 ? 0 : Math.round(i * (ww.length - 1) / (tokens.length - 1));
    return ww[wi];
  };
  subEl.innerHTML = tokens.map(tok =>
    `<span class="kw"><span class="wb">${tok}</span><span class="wf">${tok}</span></span>`).join(' ');
  const els = [...subEl.querySelectorAll('.kw')];
  lineWords = tokens.map((tok, i) => {
    const [t0, t1] = pick(i);
    return { t0, t1: Math.max(t1, t0 + 0.12), wf: els[i] ? els[i].querySelector('.wf') : null };
  });
}
function tick() {
  const t = player.currentTime;
  const s = scenes.find(sc => t >= sc.t0 && t < sc.t1) || scenes[scenes.length - 1];
  if (s !== curScene) { curScene && curScene.destroy(); curScene = s; s.init(); lastLocal = -1; }
  const localT = t - s.t0;
  if (localT < lastLocal - 0.05) { s.destroy(); s.init(); }
  s.update(localT);
  lastLocal = localT;
  const li = LINES.findIndex(([a, b]) => t >= a && t < b);
  if (li !== curLine) {
    curLine = li;
    if (li >= 0) buildKaraokeLine(li);
    else { subEl.innerHTML = ''; lineWords = []; }
    subEl.style.opacity = li >= 0 ? 1 : 0;
  }
  for (let i = 0; i < lineWords.length; i++) {
    const w = lineWords[i];
    if (!w.wf) continue;
    const nextStart = i + 1 < lineWords.length ? lineWords[i + 1].t0 : w.t1;
    let p;
    if (t >= Math.max(w.t1, nextStart)) p = 1;
    else p = clamp01((t - w.t0) / (w.t1 - w.t0));
    w.wf.style.width = (p * 100).toFixed(1) + '%';
  }
  if (!seekDragging) {
    seek.value = t;
    seek.style.setProperty('--p', (t / (player.duration || 177.3) * 100) + '%');
  }
  tCur.textContent = fmtTime(t);
  requestAnimationFrame(tick);
}
function fmtTime(t) { t = Math.max(0, t || 0); return `${Math.floor(t / 60)}:${String(Math.floor(t % 60)).padStart(2, '0')}`; }

let seekDragging = false;
seek.addEventListener('input', () => {
  seekDragging = true;
  player.currentTime = +seek.value;
  seek.style.setProperty('--p', (+seek.value / (player.duration || 177.3) * 100) + '%');
});
seek.addEventListener('change', () => { seekDragging = false; });
function togglePlay() { if (player.paused) player.play(); else player.pause(); }
player.addEventListener('play', () => { btnPlay.textContent = '⏸'; bigplay.classList.add('hidden'); });
player.addEventListener('pause', () => { btnPlay.textContent = '▶'; if (player.currentTime < 0.05 || player.ended) bigplay.classList.remove('hidden'); });
player.addEventListener('ended', () => { bigplay.classList.remove('hidden'); bigplay.querySelector('.hint').innerHTML = 'Ještě jednou?<small>R = od začátku</small>'; });
player.addEventListener('loadedmetadata', () => {
  seek.max = player.duration;
  tDur.textContent = fmtTime(player.duration);
});
btnPlay.addEventListener('click', togglePlay);
btnRestart.addEventListener('click', () => { player.currentTime = 0; player.play(); });
bigplay.addEventListener('click', () => { player.play(); });
document.getElementById('stage').addEventListener('click', (e) => {
  if (e.target.closest('#bigplay')) return;
  togglePlay();
});
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  else if (e.code === 'ArrowRight') player.currentTime = Math.min(player.duration || 177, player.currentTime + 5);
  else if (e.code === 'ArrowLeft') player.currentTime = Math.max(0, player.currentTime - 5);
  else if (e.key === 'r' || e.key === 'R' || e.code === 'Home') { player.currentTime = 0; player.play(); }
});
requestAnimationFrame(tick);
})();
</script>
