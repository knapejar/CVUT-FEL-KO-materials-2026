<style>
  :root {

    --muted: #8b93a7;
    --accent: #ffb000;

  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex; flex-direction: column; align-items: center;

  }
  #topbar {

  #topbar a { color: var(--muted); text-decoration: none; }
  #topbar a:hover { color: var(--accent); }
  #topbar .title { color: var(--text); font-weight: 700; }
  #topbar .badge {
    font-size: 11px; color: var(--bg); background: var(--accent);

    position: relative;
    width: min(96vw, calc((100vh - 150px) * 16 / 9));

  #subtitle .c2 { background: rgba(251,191,36,0.15);  color: #fbbf24; }

  .kw .wf, .kw .wf * { color: #ffd34d !important; }
  #bigplay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(5,7,12,0.55); cursor: pointer; z-index: 5;

  #bigplay.hidden { display: none; }
  #bigplay .pbtn {
    width: 110px; height: 110px; border-radius: 50%;

  #controls {
    width: min(96vw, calc((100vh - 150px) * 16 / 9));

  }
  #controls button {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    width: 42px; height: 42px; border-radius: 50%; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;

  }
  #controls button:hover { border-color: var(--accent); color: var(--accent); }
  #seek {
    flex: 1; -webkit-appearance: none; appearance: none; height: 6px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--p, 0%), #2a3040 var(--p, 0%));
    border-radius: 3px; outline: none; cursor: pointer;
  }
  #seek::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 10px rgba(255,176,0,0.6); cursor: pointer;
  }
  #seek::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%; border: none;
    background: var(--accent); cursor: pointer;
  }
  .time { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 44px; text-align: center; }
  @media (max-height: 560px) { #topbar { display: none; } }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.3/dist/pixi.min.js"></script>
<script>
(async function () {
'use strict';

// ════════════════════════════════════════════════════════════════════
// 0) helpers
// ════════════════════════════════════════════════════════════════════
const C = {
  gold: 0xffb000, goldHi: 0xffd34d, green: 0x4ade80, pink: 0xf472b6,
  cyan: 0x7dd3fc, violet: 0xa78bfa, white: 0xffffff, red: 0xef4444,
  lava: 0xff4d1a, ember: 0xff9540, steel: 0x9fb0c8, dark: 0x0b0e16,
  muted: 0x8b93a7,
};
const clamp01 = v => Math.max(0, Math.min(1, v));
const lerp = (a, b, t) => a + (b - a) * t;
const easeOut = t => 1 - Math.pow(1 - clamp01(t), 3);
const ph = (t, a, b) => clamp01((t - a) / (b - a));

// ════════════════════════════════════════════════════════════════════
// 1) PENTAGRAM GRAF + kotvy refrénů (word-level whisper)
// ════════════════════════════════════════════════════════════════════
const PCX = 380, PCY = 350, PR = 165;
const NODES = [...Array(5)].map((_, i) => ({
  x: PCX + PR * Math.sin(i * 2 * Math.PI / 5),
  y: PCY - PR * Math.cos(i * 2 * Math.PI / 5),
}));
// G = vstupní graf HC (obsahuje hamiltonovský okruh v hvězdicovém pořadí 0-2-4-1-3)
const G_EDGES = [[0, 2], [2, 4], [4, 1], [1, 3], [3, 0], [0, 1]]; // 6 hran
const NON_EDGES = [[1, 2], [2, 3], [3, 4], [4, 0]];               // 4 doplněné (drahé)
const HC = [0, 2, 4, 1, 3]; // pentagram!
const ANCH = [
  { jedna: 40.96, dva: 44.42, neni1: 49.40, nejvys: 50.12, exist: 53.38, vic: 54.48, neni2: 56.71, spor: 57.68, pnp: 59.60 },
  { jedna: 90.62, dva: 93.70, neni1: 98.56, nejvys: 99.44, exist: 102.69, vic: 103.74, neni2: 105.97, spor: 106.94, pnp: 108.86 },
  { jedna: 132.10, dva: 135.50, neni1: 140.30, nejvys: 141.10, exist: 142.70, vic: 145.90, neni2: 148.20, spor: 149.00, pnp: 151.50 },
];

// ════════════════════════════════════════════════════════════════════
// 2) PIXI + particles + SHAKE + WORD RUNES (animace každého slova!)
// ════════════════════════════════════════════════════════════════════
const app = new PIXI.Application({ width: 1280, height: 720, antialias: true, background: 0x07060a });
document.getElementById('stage').appendChild(app.view);
const sceneLayer = new PIXI.Container();
const fxLayer = new PIXI.Container();
app.stage.addChild(sceneLayer, fxLayer);
let SHAKE = 0;
const dotG = new PIXI.Graphics();
dotG.beginFill(0xffffff, 1).drawCircle(0, 0, 32).endFill();
const dotTex = app.renderer.generateTexture(dotG);
const parts = [];
function burst(x, y, tint, count = 18, speed = 220, size = 0.1, gravity = 200) {
  for (let i = 0; i < count; i++) {
    const p = new PIXI.Sprite(dotTex);
    p.anchor.set(0.5); p.x = x; p.y = y; p.tint = tint;
    p.blendMode = PIXI.BLEND_MODES.ADD;
    const a = Math.random() * 6.283, v = speed * (0.3 + Math.random() * 0.8);
    p._vx = Math.cos(a) * v; p._vy = Math.sin(a) * v;
    p._life = 0.6 + Math.random() * 0.7; p._t = 0; p._g = gravity;
    p.scale.set(size * (0.5 + Math.random()));
    fxLayer.addChild(p); parts.push(p);
  }
}
// ash (popel) — padá celým videem
const ash = [];
for (let i = 0; i < 50; i++) {
  const a = new PIXI.Sprite(dotTex);
  a.anchor.set(0.5);
  a.x = Math.random() * 1280; a.y = Math.random() * 720;
  a.scale.set(0.012 + Math.random() * 0.02);
  a.alpha = 0.15 + Math.random() * 0.3;
  a.tint = Math.random() < 0.3 ? C.ember : 0x6a7488;
  a._vy = 14 + Math.random() * 26; a._ph = Math.random() * 6.28;
  fxLayer.addChild(a); ash.push(a);
}
// WORD RUNES — každé zazpívané slovo se zhmotní jako žhnoucí runa
const runes = [];
let runeSlot = 0;
function spawnRune(word, caps) {
  const plain = word.replace(/<[^>]*>/g, '').replace(/[„“…—]/g, '').trim();
  if (!plain) return;
  const big = caps || /!$/.test(plain);
  const t = new PIXI.Text(plain.toUpperCase(), {
    fontFamily: "'Segoe UI', system-ui, sans-serif",
    fontSize: big ? 46 : 26, fontWeight: '900',
    fill: big ? ['#fff3b0', '#ff4d1a'] : ['#ffd34d', '#b8410e'],
    stroke: 0x1a0b05, strokeThickness: big ? 7 : 4,
    dropShadow: true, dropShadowColor: 0xff4d1a, dropShadowBlur: 14, dropShadowDistance: 0,
  });
  t.anchor.set(0.5); t.resolution = 2;
  runeSlot = (runeSlot + 1) % 7;
  t.x = big ? 640 : 140 + runeSlot * 165 + (Math.random() - 0.5) * 50;
  t.y = big ? 560 : 648;
  t._vy = big ? -130 : -85 - Math.random() * 40;
  t._life = big ? 1.5 : 1.1; t._t = 0; t._big = big;
  t.rotation = (Math.random() - 0.5) * 0.12;
  fxLayer.addChild(t); runes.push(t);
  burst(t.x, t.y + 8, big ? C.lava : C.ember, big ? 22 : 7, big ? 240 : 110, big ? 0.11 : 0.06, 30);
  if (big) SHAKE = Math.max(SHAKE, 9);
}
app.ticker.add(() => {
  const dt = app.ticker.deltaMS / 1000;
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p._t += dt; p.x += p._vx * dt; p.y += p._vy * dt;
    p._vy += p._g * dt; p.alpha = clamp01(1 - p._t / p._life);
    if (p._t > p._life) { fxLayer.removeChild(p); p.destroy(); parts.splice(i, 1); }
  }
  for (const a of ash) {
    a.y += a._vy * dt; a._ph += dt;
    a.x += Math.sin(a._ph) * 12 * dt;
    if (a.y > 730) { a.y = -10; a.x = Math.random() * 1280; }
  }
  for (let i = runes.length - 1; i >= 0; i--) {
    const r = runes[i];
    r._t += dt; r.y += r._vy * dt; r._vy *= 0.985;
    const k = r._t / r._life;
    r.alpha = k < 0.15 ? k / 0.15 : 1 - ph(k, 0.45, 1);
    r.scale.set(r._big ? lerp(1.6, 1.0, easeOut(k * 2)) : 1);
    if (r._t > r._life) { fxLayer.removeChild(r); r.destroy(); runes.splice(i, 1); }
  }
  // shake decay
  if (SHAKE > 0.1) {
    sceneLayer.x = (Math.random() - 0.5) * SHAKE;
    sceneLayer.y = (Math.random() - 0.5) * SHAKE;
    SHAKE *= Math.pow(0.0018, dt);
  } else { sceneLayer.x = 0; sceneLayer.y = 0; }
});
function txt(str, size, color, weight = '800', family = "'Segoe UI', system-ui, sans-serif") {
  const t = new PIXI.Text(str, {
    fontFamily: family, fontSize: size, fill: color, fontWeight: weight,
    align: 'center', dropShadow: true, dropShadowColor: 0x000000,
    dropShadowBlur: 8, dropShadowAlpha: 0.6, dropShadowDistance: 2,
  });
  t.anchor.set(0.5); t.resolution = 2;
  return t;
}
const MATH = "'Cambria Math', Cambria, Georgia, serif";

// Hamiltonův portrét (public domain, Wikimedia Commons — viz assets/img/CREDITS.txt)
let hamTex = null;
try { hamTex = await PIXI.Assets.load('assets/img/hamilton.png'); } catch (e) { console.warn('portrait load failed', e); }

// ════════════════════════════════════════════════════════════════════
// 3) KULISA — vulkanická scéna + pentagramový graf + portrét
// ════════════════════════════════════════════════════════════════════
function buildHell(c) {
  const g = new PIXI.Graphics(); c.addChildAt(g, 0);
  function render(t, o = {}) {
    g.clear();
    // nebe
    g.beginFill(0x120a14, 1).drawRect(0, 0, 1280, 300).endFill();
    g.beginFill(0x1c0f14, 1).drawRect(0, 300, 1280, 220).endFill();
    g.beginFill(0x2a1210, 1).drawRect(0, 520, 1280, 200).endFill();
    // sopky
    g.beginFill(0x16090b, 1);
    g.drawPolygon([0, 560, 200, 360, 330, 560]);
    g.drawPolygon([1000, 560, 1130, 330, 1280, 560]);
    g.endFill();
    g.beginFill(C.lava, 0.6 + 0.25 * Math.sin(t * 3));
    g.drawPolygon([185, 372, 200, 360, 218, 374, 200, 382]);
    g.drawPolygon([1115, 344, 1130, 330, 1148, 346, 1130, 355]);
    g.endFill();
    // blesk (řízený nebo náhodný puls)
    const flash = o.flash || (Math.sin(t * 1.7) > 0.992 ? 0.7 : 0);
    if (flash > 0) {
      g.lineStyle(5, 0xeef3ff, flash);
      const bx = o.flashX ?? 640;
      g.moveTo(bx, 0); g.lineTo(bx - 30, 110); g.lineTo(bx + 14, 150); g.lineTo(bx - 26, 260);
      g.lineStyle(0);
      g.beginFill(0xeef3ff, flash * 0.12).drawRect(0, 0, 1280, 720).endFill();
    }
    // ohnivá linie dole
    g.lineStyle(0);
    g.beginFill(0x1a0b05, 1).drawRect(0, 640, 1280, 80).endFill();
    g.beginFill(C.lava, 0.5);
    g.moveTo(0, 660);
    for (let x = 0; x <= 1280; x += 40) g.lineTo(x, 652 + Math.sin(x * 0.08 + t * 5) * 7);
    g.lineTo(1280, 720); g.lineTo(0, 720);
    g.closePath().endFill();
    // easter egg: zaváté v popelu
    return flash;
  }
  return { render };
}
function buildGraph(c) {
  const g = new PIXI.Graphics(); c.addChild(g);
  const wT = [];
  function render(t, o = {}) {
    g.clear();
    // summon circle pod grafem
    const circ = o.circle ?? 0.3;
    g.lineStyle(3, C.lava, 0.25 + 0.2 * circ * (0.6 + 0.4 * Math.sin(t * 2.4)));
    g.drawCircle(PCX, PCY, PR + 38);
    g.drawCircle(PCX, PCY, PR + 52);
    // hrany G (levné)
    G_EDGES.forEach(([a, b], i) => {
      const on = o.cheapHL && t > o.cheapHL;
      g.lineStyle(on ? 6 : 4, on ? C.cyan : C.steel, o.gAlpha ?? 0.9);
      g.moveTo(NODES[a].x, NODES[a].y); g.lineTo(NODES[b].x, NODES[b].y);
    });
    // doplněné hrany (drahé, lávové) — odlévají se v čase forgeT
    NON_EDGES.forEach(([a, b], i) => {
      const p = o.forgeT ? ph(t, o.forgeT + i * 0.55, o.forgeT + i * 0.55 + 0.5) : 1;
      if (p <= 0) return;
      const hot = o.expHL && t > o.expHL;
      g.lineStyle(hot ? 6 : 4, C.lava, (0.55 + 0.45 * (hot ? 0.6 + 0.4 * Math.sin(t * 6) : 0)) * p);
      g.moveTo(NODES[a].x, NODES[a].y);
      g.lineTo(lerp(NODES[a].x, NODES[b].x, p), lerp(NODES[a].y, NODES[b].y, p));
    });
    // HC pentagram (когда Hamilton žije)
    if (o.pentagram > 0) {
      g.lineStyle(7, C.goldHi, 0.9 * o.pentagram);
      for (let i = 0; i < 5; i++) {
        const a = NODES[HC[i]], b = NODES[HC[(i + 1) % 5]];
        g.moveTo(a.x, a.y); g.lineTo(b.x, b.y);
      }
    }
    // uzly
    NODES.forEach((P, i) => {
      g.lineStyle(0);
      g.beginFill(0x07060a, 1).drawCircle(P.x, P.y, 17).endFill();
      g.beginFill(o.pentagram > 0 ? C.goldHi : C.steel, 1).drawCircle(P.x, P.y, 13).endFill();
    });
  }
  return { render };
}
// portrét v rámu — sláva / škrtnutí
function buildPortrait(c) {
  const wrap = new PIXI.Container(); wrap.x = 985; wrap.y = 330; wrap.alpha = 0; c.addChild(wrap);
  const g = new PIXI.Graphics(); wrap.addChild(g);
  let spr = null;
  if (hamTex) {
    spr = new PIXI.Sprite(hamTex); spr.anchor.set(0.5);
    spr.width = 186; spr.height = 255; wrap.addChild(spr);
  }
  const name = txt('W. R. HAMILTON', 17, C.goldHi, '900'); name.y = 152; wrap.addChild(name);
  const xg = new PIXI.Graphics(); wrap.addChild(xg);
  function render(t, o = {}) {
    // o.show = čas slávy, o.cross = čas škrtnutí, o.crown = čas korunovace
    const vis = o.show ? easeOut(ph(t, o.show, o.show + 0.6)) : 0;
    wrap.alpha = vis;
    wrap.y = lerp(250, 330, vis);
    g.clear();
    const dead = o.cross && t > o.cross;
    // aura
    if (!dead) g.beginFill(C.goldHi, 0.12 + 0.07 * Math.sin(t * 4)).drawCircle(0, 0, 165).endFill();
    // rám
    g.lineStyle(10, dead ? 0x4a3a16 : C.gold, 1);
    g.beginFill(0x120d08, spr ? 0 : 0.9);
    g.drawRoundedRect(-100, -135, 200, 270, 10);
    g.endFill();
    [[-100, -135], [100, -135], [-100, 135], [100, 135]].forEach(([x, y]) => {
      g.lineStyle(0); g.beginFill(dead ? 0x4a3a16 : C.goldHi, 1).drawCircle(x, y, 9).endFill();
    });
    if (spr) spr.tint = dead ? 0x665555 : 0xffffff;
    // škrtnutí
    xg.clear();
    if (dead) {
      const p = easeOut(ph(t, o.cross, o.cross + 0.45));
      xg.lineStyle(14, C.red, 0.95);
      xg.moveTo(-95, -125); xg.lineTo(lerp(-95, 95, p), lerp(-125, 125, p));
      if (p > 0.5) { xg.moveTo(95, -125); xg.lineTo(lerp(95, -95, (p - 0.5) * 2), lerp(-125, 125, (p - 0.5) * 2)); }
    }
    // koruna (bridge)
    if (o.crown) {
      const cp = easeOut(ph(t, o.crown, o.crown + 0.8));
      if (cp > 0) {
        const cy = lerp(-260, -168, cp);
        g.lineStyle(3, 0x7a5a10, 1);
        g.beginFill(C.goldHi, 1);
        g.drawPolygon([-52, cy + 28, 52, cy + 28, 52, cy + 6, 30, cy + 18, 12, cy - 6, 0, cy + 14, -12, cy - 6, -30, cy + 18, -52, cy + 6]);
        g.endFill();
      }
    }
  }
  return { render };
}

// ════════════════════════════════════════════════════════════════════
// 4) SCÉNY
// ════════════════════════════════════════════════════════════════════
const scenes = [];
function scene(t0, t1, build) {
  const s = { t0, t1, st: null };
  s.init = () => { s.st = build(); sceneLayer.addChild(s.st.c); };
  s.update = (lt) => s.st && s.st.update(lt);
  s.destroy = () => { if (s.st) { sceneLayer.removeChild(s.st.c); s.st.c.destroy({ children: true }); s.st = null; } };
  scenes.push(s);
  return s;
}
function caption(c, str, color = C.gold, y = 42, size = 25) {

// ── CHORUS factory: váhy + PROPAST + portrét + P=NP deska ──
function chorusScene(t0, t1, an) {
  scene(t0, t1, () => {
    const c = new PIXI.Container();
    const hell = buildHell(c);
    const graph = buildGraph(c);
    const portrait = buildPortrait(c);
    const cap = caption(c, '');
    const w1 = txt('1', 54, C.cyan, '900', MATH); w1.x = PCX - 60; w1.y = 110; w1.alpha = 0; c.addChild(w1);
    const w1b = txt('hrana v G', 18, C.cyan, '700'); w1b.x = PCX - 60; w1b.y = 150; w1b.alpha = 0; c.addChild(w1b);
    const w2 = txt('2 + (r−1)·n', 44, C.lava, '900', MATH); w2.x = PCX + 105, w2.y = 110; w2.alpha = 0; c.addChild(w2);
    const w2b = txt('hrana MIMO G', 18, C.lava, '700'); w2b.x = PCX + 105; w2b.y = 150; w2b.alpha = 0; c.addChild(w2b);
    // propast — číselná osa s kaňonem
    const gg = new PIXI.Graphics(); c.addChild(gg);
    const nLab = txt('n', 24, C.goldHi, '900', MATH); nLab.alpha = 0; c.addChild(nLab);
    const rnLab = txt('r·n', 24, C.cyan, '900', MATH); rnLab.alpha = 0; c.addChild(rnLab);
    const rn1Lab = txt('r·n + 1', 24, C.lava, '900', MATH); rn1Lab.alpha = 0; c.addChild(rn1Lab);
    // P=NP deska
    const tablet = new PIXI.Container(); tablet.x = 640; tablet.y = 560; tablet.alpha = 0; c.addChild(tablet);
    const tg = new PIXI.Graphics(); tablet.addChild(tg);
    const tT = txt('P = NP', 40, 0xcfd8e8, '900', MATH); tablet.addChild(tT);
    const fired = new Set();
    return { c, update(lt0) {
      const lt = lt0 + t0;
      const sporP = lt > an.spor;
      const flash = sporP && lt < an.spor + 0.35 ? 0.95 : 0;
      hell.render(lt, { flash, flashX: 640 });
      graph.render(lt, {
        circle: 1,
        cheapHL: an.jedna, expHL: an.dva,
        pentagram: lt > an.exist && lt < an.vic ? easeOut(ph(lt, an.exist, an.exist + 0.5)) : (lt >= an.vic ? Math.max(0, 1 - ph(lt, an.vic, an.vic + 0.6)) : 0),
      });
      portrait.render(lt, { show: an.exist, cross: an.neni2 });
      // váhy
      w1.alpha = lt > an.jedna ? 1 : 0; w1b.alpha = w1.alpha;
      w2.alpha = lt > an.dva ? 1 : 0; w2b.alpha = w2.alpha;
      w1.scale.set(lerp(1.8, 1, easeOut(ph(lt, an.jedna, an.jedna + 0.4))));
      w2.scale.set(lerp(1.8, 1, easeOut(ph(lt, an.dva, an.dva + 0.4))));
      if (lt > an.jedna && !fired.has('1')) { fired.add('1'); burst(PCX - 60, 110, C.cyan, 22, 250, 0.11); }
      if (lt > an.dva && !fired.has('2')) { fired.add('2'); burst(PCX + 105, 110, C.lava, 26, 280, 0.12); SHAKE = Math.max(SHAKE, 7); }
      // PROPAST: osa od „nejvýš r·n“
      gg.clear();
      if (lt > an.nejvys) {
        const ax0 = 740, ax1 = 1240, ay = 540;
        const gapX = lerp(ax0, ax1, 0.55);
        const open = easeOut(ph(lt, an.neni1, an.neni1 + 0.8)) * 26 + 8;
        gg.lineStyle(6, C.steel, 0.95);
        gg.moveTo(ax0, ay); gg.lineTo(gapX - open, ay);
        gg.moveTo(gapX + open, ay); gg.lineTo(ax1, ay);
        // kaňon
        gg.lineStyle(3, C.lava, 0.9);
        gg.moveTo(gapX - open, ay); gg.lineTo(gapX - open / 2, ay + 46); gg.lineTo(gapX, ay + 30); gg.lineTo(gapX + open / 2, ay + 52); gg.lineTo(gapX + open, ay);
        nLab.alpha = 1; nLab.x = ax0 + 30; nLab.y = ay - 24;
        rnLab.alpha = 1; rnLab.x = gapX - open - 26; rnLab.y = ay - 24;
        rn1Lab.alpha = 1; rn1Lab.x = gapX + open + 44; rn1Lab.y = ay - 24;
        // ukazatel APX výsledku
        const mk = lt > an.vic ? lerp(gapX + open + 40, ax1 - 30, 0.3) : lerp(ax0 + 20, gapX - open - 10, clamp01((lt - an.nejvys) / 2));
        gg.lineStyle(0);
        gg.beginFill(lt > an.vic ? C.lava : C.goldHi, 1);
        gg.drawPolygon([mk - 9, ay - 38, mk + 9, ay - 38, mk, ay - 22]);
        gg.endFill();
      } else { nLab.alpha = 0; rnLab.alpha = 0; rn1Lab.alpha = 0; }
      // deska P=NP — roztříští se na SPOR!
      tablet.alpha = lt > an.nejvys ? 1 : 0;
      tg.clear();
      if (!sporP) {
        tg.lineStyle(4, 0x55617a, 1);
        tg.beginFill(0x222a3a, 0.95);
        tg.drawRoundedRect(-130, -44, 260, 88, 10);
        tg.endFill();
        tT.text = 'P = NP'; tT.style.fill = 0xcfd8e8;
      } else {
        const p = easeOut(ph(lt, an.spor, an.spor + 0.8));
        // střepy
        [[-1.4, -1, -0.4], [1.3, -0.8, 0.5], [-0.9, 1.1, -0.3], [1.0, 1.2, 0.6], [0, 1.5, 0.2]].forEach(([dx, dy, dr], i) => {
          tg.lineStyle(3, 0x55617a, 1 - p * 0.5);
          tg.beginFill(0x222a3a, 0.9 - p * 0.4);
          const ox = dx * 130 * p, oy = dy * 90 * p + 60 * p * p;
          tg.drawRoundedRect(-55 + ox, -30 + oy, 95, 52, 6);
          tg.endFill();
        });
        tT.text = 'P ≠ NP'; tT.style.fill = C.goldHi;
        tT.scale.set(lerp(1.6, 1, p));
        if (!fired.has('spor')) { fired.add('spor'); SHAKE = 18; burst(640, 560, 0xeef3ff, 44, 380, 0.15); }
      }
      if (lt > an.pnp && !fired.has('pnp')) { fired.add('pnp'); burst(640, 560, C.goldHi, 26, 280, 0.12); }
      // captions
      if (lt < an.nejvys) { cap.text = 'OCENĚNÍ HRAN: levné v G, drahé mimo G'; cap.style.fill = C.goldHi; }
      else if (lt < an.vic) { cap.text = 'výsledek ≤ r·n  ⟺  HAMILTON EXISTUJE (pentagram!)'; cap.style.fill = C.goldHi; }
      else if (lt < an.spor) { cap.text = 'výsledek > r·n  ⟹  Hamilton NENÍ — propast nelze přeskočit'; cap.style.fill = C.lava; }
      else { cap.text = 'APXʳ by rozhodl NP-úplný problém → SPOR (pokud P ≠ NP)'; cap.style.fill = 0xeef3ff; }
    } };
  });
}

// 6) PLAYER / KARAOKE + WORD-EVENT BUS / CONTROLS
// ════════════════════════════════════════════════════════════════════
const player = document.getElementById('player');
const subEl = document.getElementById('subtitle');
const bigplay = document.getElementById('bigplay');
const btnPlay = document.getElementById('btnPlay');
const btnRestart = document.getElementById('btnRestart');
const seek = document.getElementById('seek');
const tCur = document.getElementById('tCur');
const tDur = document.getElementById('tDur');

let curScene = null, lastLocal = -1, curLine = -1, lastT = 0;
let lineWords = [];
function tokenize(html) {
  const out = []; let cur = ''; let inTag = false;
  for (const ch of html) {
    if (ch === '<') inTag = true;
    else if (ch === '>') inTag = false;
    if (ch === ' ' && !inTag) { if (cur) out.push(cur); cur = ''; }
    else cur += ch;
  }
  if (cur) out.push(cur);
  return out;
}
function isCapsToken(tok) {
  const plain = tok.replace(/<[^>]*>/g, '');
  const letters = plain.replace(/[^a-zA-ZáčďéěíňóřšťúůýžÁČĎÉĚÍŇÓŘŠŤÚŮÝŽ]/g, '');
  return letters.length >= 2 && letters === letters.toUpperCase();
}
function buildKaraokeLine(li) {
  const [a, b, html] = LINES[li];
  const tokens = tokenize(html);
  const ww = SUNG.filter(w => w[0] >= a - 0.06 && w[0] < b && w[1] > w[0]);
  const pick = (i) => {
    if (!ww.length) {
      const step = (b - a) / tokens.length;
      return [a + step * i, a + step * (i + 1)];
    }
    const wi = tokens.length === 1 ? 0 : Math.round(i * (ww.length - 1) / (tokens.length - 1));
    return ww[wi];
  };
  subEl.innerHTML = tokens.map(tok =>
    `<span class="kw"><span class="wb">${tok}</span><span class="wf">${tok}</span></span>`).join(' ');
  const els = [...subEl.querySelectorAll('.kw')];
  lineWords = tokens.map((tok, i) => {
    const [t0, t1] = pick(i);
    return { t0, t1: Math.max(t1, t0 + 0.12), wf: els[i] ? els[i].querySelector('.wf') : null, tok, caps: isCapsToken(tok) };
  });
}
function tick() {
  const t = player.currentTime;
  const s = scenes.find(sc => t >= sc.t0 && t < sc.t1) || scenes[scenes.length - 1];
  if (s !== curScene) { curScene && curScene.destroy(); curScene = s; s.init(); lastLocal = -1; }
  const localT = t - s.t0;
  if (localT < lastLocal - 0.05) { s.destroy(); s.init(); }
  s.update(localT);
  lastLocal = localT;
  const li = LINES.findIndex(([a, b]) => t >= a && t < b);
  if (li !== curLine) {
    curLine = li;
    if (li >= 0) buildKaraokeLine(li);
    else { subEl.innerHTML = ''; lineWords = []; }
    subEl.style.opacity = li >= 0 ? 1 : 0;
  }
  // WORD-EVENT BUS: každé slovo vystřelí svou runu přesně v t0
  if (!player.paused && t > lastT && t - lastT < 0.5) {
    for (const w of lineWords) {
      if (w.t0 > lastT && w.t0 <= t) spawnRune(w.tok, w.caps);
    }
  }
  lastT = t;
  for (let i = 0; i < lineWords.length; i++) {
    const w = lineWords[i];
    if (!w.wf) continue;
    const nextStart = i + 1 < lineWords.length ? lineWords[i + 1].t0 : w.t1;
    let p;
    if (t >= Math.max(w.t1, nextStart)) p = 1;
    else p = clamp01((t - w.t0) / (w.t1 - w.t0));
    w.wf.style.width = (p * 100).toFixed(1) + '%';
  }
  if (!seekDragging) {
    seek.value = t;
    seek.style.setProperty('--p', (t / (player.duration || 175.5) * 100) + '%');
  }
  tCur.textContent = fmtTime(t);
  requestAnimationFrame(tick);
}
function fmtTime(t) { t = Math.max(0, t || 0); return `${Math.floor(t / 60)}:${String(Math.floor(t % 60)).padStart(2, '0')}`; }

let seekDragging = false;
seek.addEventListener('input', () => {
  seekDragging = true;
  player.currentTime = +seek.value;
  seek.style.setProperty('--p', (+seek.value / (player.duration || 175.5) * 100) + '%');
});
seek.addEventListener('change', () => { seekDragging = false; });
function togglePlay() { if (player.paused) player.play(); else player.pause(); }
player.addEventListener('play', () => { btnPlay.textContent = '⏸'; bigplay.classList.add('hidden'); });
player.addEventListener('pause', () => { btnPlay.textContent = '▶'; if (player.currentTime < 0.05 || player.ended) bigplay.classList.remove('hidden'); });
player.addEventListener('ended', () => { bigplay.classList.remove('hidden'); bigplay.querySelector('.hint').innerHTML = 'Ještě jednou?<small>R = od začátku</small>'; });
player.addEventListener('loadedmetadata', () => {
  seek.max = player.duration;
  tDur.textContent = fmtTime(player.duration);
});
btnPlay.addEventListener('click', togglePlay);
btnRestart.addEventListener('click', () => { player.currentTime = 0; player.play(); });
bigplay.addEventListener('click', () => { player.play(); });
document.getElementById('stage').addEventListener('click', (e) => {
  if (e.target.closest('#bigplay')) return;
  togglePlay();
});
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  else if (e.code === 'ArrowRight') player.currentTime = Math.min(player.duration || 175, player.currentTime + 5);
  else if (e.code === 'ArrowLeft') player.currentTime = Math.max(0, player.currentTime - 5);
  else if (e.key === 'r' || e.key === 'R' || e.code === 'Home') { player.currentTime = 0; player.play(); }
});
requestAnimationFrame(tick);
})();
</script>
