<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">

<title>Christofides 3/2 — immersive video · KO Hitovky</title>
<style>
  :root {
    --bg: #07090f;
    --panel: #11141d;
    --text: #e8eaf0;
    --muted: #8b93a7;
    --accent: #ffb000;
    --border: #232a3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; overflow: hidden;
  }
  #topbar {
    width: 100%; display: flex; align-items: center; gap: 12px;
    padding: 10px 18px; font-size: 13px; color: var(--muted);
  }
  #topbar a { color: var(--muted); text-decoration: none; }
  #topbar a:hover { color: var(--accent); }
  #topbar .title { color: var(--text); font-weight: 700; }
  #topbar .badge {
    font-size: 11px; color: var(--bg); background: var(--accent);
    border-radius: 10px; padding: 2px 9px; font-weight: 700;
  }
  #stagewrap {
    flex: 1; width: 100%; display: flex; align-items: center; justify-content: center;
    min-height: 0; padding: 0 16px;
  }
  #stage {
    position: relative;
    width: min(96vw, calc((100vh - 150px) * 16 / 9));
    aspect-ratio: 16 / 9;
    background: #0b0e16; border-radius: 12px; overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
  }
  #stage canvas { position: absolute; inset: 0; width: 100% !important; height: 100% !important; }
  #subtitle {
    position: absolute; left: 4%; right: 4%; bottom: 4.5%;
    text-align: center; pointer-events: none;
    font-size: clamp(13px, 2.2vw, 24px); font-weight: 600; line-height: 1.35;
    color: #fff; text-shadow: 0 2px 12px rgba(0,0,0,0.95), 0 0 4px rgba(0,0,0,0.9);
  }
  #subtitle .m {
    font-family: 'Cambria Math', Cambria, Georgia, serif; font-style: italic;
    color: #7dd3fc;
  }
  #bigplay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(5,7,12,0.55); cursor: pointer; z-index: 5;
    flex-direction: column; gap: 18px;
  }
  #bigplay.hidden { display: none; }
  #bigplay .pbtn {
    width: 110px; height: 110px; border-radius: 50%;
    background: var(--accent); color: #1a1200;
    display: flex; align-items: center; justify-content: center;
    font-size: 44px; box-shadow: 0 0 60px rgba(255,176,0,0.45);
    transition: transform .15s;
  }
  #bigplay:hover .pbtn { transform: scale(1.08); }
  #bigplay .hint { color: var(--text); font-size: 15px; font-weight: 600; text-shadow: 0 2px 8px #000; }
  #bigplay .hint small { display: block; color: var(--muted); font-weight: 400; margin-top: 6px; }
  #controls {
    width: min(96vw, calc((100vh - 150px) * 16 / 9));
    display: flex; align-items: center; gap: 12px;
    padding: 12px 4px 16px;
  }
  #controls button {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    width: 42px; height: 42px; border-radius: 50%; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: border-color .15s, color .15s;
  }
  #controls button:hover { border-color: var(--accent); color: var(--accent); }
  #seek {
    flex: 1; -webkit-appearance: none; appearance: none; height: 6px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--p, 0%), #2a3040 var(--p, 0%));
    border-radius: 3px; outline: none; cursor: pointer;
  }
  #seek::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 10px rgba(255,176,0,0.6); cursor: pointer;
  }
  #seek::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%; border: none;
    background: var(--accent); cursor: pointer;
  }
  .time { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 44px; text-align: center; }
  @media (max-height: 560px) { #topbar { display: none; } }
</style>
</head>
<body>

<div id="topbar">
  <a href="pisnicky.html">← Zpěvník</a>
  <span class="title">Jedna a půl (Christofides)</span>
  <span class="badge">IMMERSIVE VIDEO</span>
  <span style="margin-left:auto">mezerník = play/pauza · ←/→ = ±5 s · R = od začátku</span>
</div>

<div id="stagewrap">
  <div id="stage">
    <div id="subtitle"></div>
    <div id="bigplay">
      <div class="pbtn">▶</div>
      <div class="hint">Christofidesův algoritmus &amp; důkaz faktoru 3/2<small>2 min 41 s · zpívaná videolekce</small></div>
    </div>
  </div>
</div>

<div id="controls">
  <button id="btnPlay" title="Play / pauza">▶</button>
  <button id="btnRestart" title="Od začátku">⟲</button>
  <span class="time" id="tCur">0:00</span>
  <input type="range" id="seek" min="0" max="161.4" step="0.01" value="0">
  <span class="time" id="tDur">2:41</span>
</div>

<audio id="player" src="audio/christofidova-jedna-pul.mp3" preload="auto"></audio>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.3/dist/pixi.min.js"></script>
<script>
(async function () {
'use strict';

// ════════════════════════════════════════════════════════════════════
// 0) COLORS + helpers
// ════════════════════════════════════════════════════════════════════
const C = {
  bg: 0x0b0e16, gold: 0xffb000, goldHi: 0xffd34d, green: 0x4ade80,
  pink: 0xf472b6, cyan: 0x7dd3fc, violet: 0xa78bfa, white: 0xffffff,
  dim: 0x2a3346, muted: 0x8b93a7, red: 0xef4444,
};
const clamp01 = v => Math.max(0, Math.min(1, v));
const lerp = (a, b, t) => a + (b - a) * t;
const easeOut = t => 1 - Math.pow(1 - clamp01(t), 3);
const easeIO = t => { t = clamp01(t); return t < .5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; };
// phase helper: progress 0..1 of [a,b] within localT
const ph = (t, a, b) => clamp01((t - a) / (b - a));

// ════════════════════════════════════════════════════════════════════
// 1) GRAPH INSTANCE — everything computed for real
// ════════════════════════════════════════════════════════════════════
const N = [ // 8 cities, stage coords (metric = Euclidean plane)
  { x: 350, y: 215 }, { x: 645, y: 150 }, { x: 930, y: 235 },
  { x: 1005, y: 445 }, { x: 790, y: 565 }, { x: 505, y: 585 },
  { x: 285, y: 465 }, { x: 655, y: 372 },
];
const n = N.length;
const dist = (i, j) => Math.hypot(N[i].x - N[j].x, N[i].y - N[j].y);
const UNIT = 60; // px per "cost unit" for displayed numbers
const cost = (i, j) => dist(i, j) / UNIT;
const fmt = v => v.toFixed(1);

// — MST (Prim) —
const mst = [];
{
  const inT = [true, ...Array(n - 1).fill(false)];
  for (let k = 1; k < n; k++) {
    let best = null;
    for (let a = 0; a < n; a++) if (inT[a])
      for (let b = 0; b < n; b++) if (!inT[b])
        if (!best || dist(a, b) < dist(best[0], best[1])) best = [a, b];
    inT[best[1]] = true; mst.push(best);
  }
}
const degT = Array(n).fill(0);
mst.forEach(([a, b]) => { degT[a]++; degT[b]++; });
const W = [...Array(n).keys()].filter(v => degT[v] % 2 === 1);

// — min-weight perfect matching on W (brute force, |W| small) —
function bestMatching(list) {
  if (list.length === 0) return { cost: 0, pairs: [] };
  const [first, ...rest] = list;
  let best = null;
  for (let i = 0; i < rest.length; i++) {
    const partner = rest[i];
    const remain = rest.filter((_, k) => k !== i);
    const sub = bestMatching(remain);
    const c = dist(first, partner) + sub.cost;
    if (!best || c < best.cost) best = { cost: c, pairs: [[first, partner], ...sub.pairs] };
  }
  return best;
}
const M = bestMatching(W).pairs;

// — Euler walk on multigraph T ∪ M (Hierholzer) —
const multiE = [...mst.map(([a, b]) => ({ a, b })), ...M.map(([a, b]) => ({ a, b }))];
function eulerWalk() {
  const adj = Array.from({ length: n }, () => []);
  multiE.forEach((e, i) => { adj[e.a].push(i); adj[e.b].push(i); });
  const used = Array(multiE.length).fill(false);
  const stack = [multiE[0].a], circuit = [];
  while (stack.length) {
    const v = stack[stack.length - 1];
    let found = -1;
    while (adj[v].length) {
      const ei = adj[v].pop();
      if (!used[ei]) { found = ei; break; }
    }
    if (found === -1) { circuit.push(stack.pop()); }
    else {
      used[found] = true;
      const e = multiE[found];
      stack.push(e.a === v ? e.b : e.a);
    }
  }
  return circuit.reverse();
}
const L = eulerWalk(); // node sequence, length = |E|+1, closed

// — shortcutting → Hamiltonian circuit H —
const Horder = [];
{
  const seen = new Set();
  for (const v of L) if (!seen.has(v)) { seen.add(v); Horder.push(v); }
}
const Hedges = Horder.map((v, i) => [v, Horder[(i + 1) % n]]);

// — OPT (brute force TSP, fix node 0) —
let OPTorder = null, OPTcost = Infinity;
{
  const perm = [...Array(n - 1).keys()].map(v => v + 1);
  const rec = (arr, chosen) => {
    if (!arr.length) {
      let c = dist(0, chosen[0]);
      for (let i = 0; i < chosen.length - 1; i++) c += dist(chosen[i], chosen[i + 1]);
      c += dist(chosen[chosen.length - 1], 0);
      if (c < OPTcost) { OPTcost = c; OPTorder = [0, ...chosen]; }
      return;
    }
    for (let i = 0; i < arr.length; i++) rec(arr.filter((_, k) => k !== i), [...chosen, arr[i]]);
  };
  rec(perm, []);
}
const OPTedges = OPTorder.map((v, i) => [v, OPTorder[(i + 1) % n]]);
// C_W = OPT shortcut to W vertices only, alternate edges → two matchings
const CWorder = OPTorder.filter(v => W.includes(v));
const CWedges = CWorder.map((v, i) => [v, CWorder[(i + 1) % CWorder.length]]);

const cT = mst.reduce((s, [a, b]) => s + cost(a, b), 0);
const cM = M.reduce((s, [a, b]) => s + cost(a, b), 0);
const cL = cT + cM;
const cH = Hedges.reduce((s, [a, b]) => s + cost(a, b), 0);
const cOPT = OPTcost / UNIT;

// walk geometry for comet animation along L
const walkSegs = [];
let walkLen = 0;
for (let i = 0; i < L.length - 1; i++) {
  const a = N[L[i]], b = N[L[i + 1]];
  const len = Math.hypot(b.x - a.x, b.y - a.y);
  walkSegs.push({ a, b, len, off: walkLen, ai: L[i], bi: L[i + 1] });
  walkLen += len;
}
function walkPoint(d) {
  d = Math.max(0, Math.min(walkLen - 0.001, d));
  for (const s of walkSegs) if (d <= s.off + s.len) {
    const t = (d - s.off) / s.len;
    return { x: lerp(s.a.x, s.b.x, t), y: lerp(s.a.y, s.b.y, t) };
  }
  return walkSegs[walkSegs.length - 1].b;
}

// ════════════════════════════════════════════════════════════════════
// 2) PIXI SETUP
// ════════════════════════════════════════════════════════════════════
const app = new PIXI.Application({ width: 1280, height: 720, antialias: true, background: C.bg });
document.getElementById('stage').appendChild(app.view);

const starLayer = new PIXI.Container();
const sceneLayer = new PIXI.Container();
const fxLayer = new PIXI.Container();
app.stage.addChild(starLayer, sceneLayer, fxLayer);

// glow dot texture
const dotG = new PIXI.Graphics();
dotG.beginFill(0xffffff, 1).drawCircle(0, 0, 32).endFill();
const dotTex = app.renderer.generateTexture(dotG);
const softG = new PIXI.Graphics();
for (let r = 32; r > 0; r -= 2) softG.beginFill(0xffffff, 0.045).drawCircle(0, 0, r).endFill();
const softTex = app.renderer.generateTexture(softG);

// — starfield —
const stars = [];
for (let i = 0; i < 70; i++) {
  const s = new PIXI.Sprite(dotTex);
  s.anchor.set(0.5);
  s.x = Math.random() * 1280; s.y = Math.random() * 720;
  s.scale.set(0.015 + Math.random() * 0.035);
  s.alpha = 0.12 + Math.random() * 0.25;
  s.tint = Math.random() < 0.25 ? C.gold : 0x9fb4ff;
  s._vy = 2 + Math.random() * 6; s._tw = Math.random() * 6.28;
  starLayer.addChild(s); stars.push(s);
}

// — particles —
const parts = [];
function burst(x, y, tint, count = 18, speed = 220, size = 0.1) {
  for (let i = 0; i < count; i++) {
    const p = new PIXI.Sprite(dotTex);
    p.anchor.set(0.5); p.x = x; p.y = y; p.tint = tint;
    p.blendMode = PIXI.BLEND_MODES.ADD;
    const a = Math.random() * 6.283, v = speed * (0.3 + Math.random() * 0.8);
    p._vx = Math.cos(a) * v; p._vy = Math.sin(a) * v;
    p._life = 0.6 + Math.random() * 0.7; p._t = 0;
    p.scale.set(size * (0.5 + Math.random()));
    fxLayer.addChild(p); parts.push(p);
  }
}
app.ticker.add(() => {
  const dt = app.ticker.deltaMS / 1000;
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p._t += dt; p.x += p._vx * dt; p.y += p._vy * dt;
    p._vy += 220 * dt; p.alpha = clamp01(1 - p._t / p._life);
    if (p._t > p._life) { fxLayer.removeChild(p); p.destroy(); parts.splice(i, 1); }
  }
  for (const s of stars) {
    s.y += s._vy * dt; s._tw += dt * 2;
    s.alpha = 0.1 + 0.18 * (0.5 + 0.5 * Math.sin(s._tw));
    if (s.y > 730) { s.y = -10; s.x = Math.random() * 1280; }
  }
});

// — text helpers —
function txt(str, size, color, weight = '800', family = "'Segoe UI', system-ui, sans-serif") {
  const t = new PIXI.Text(str, {
    fontFamily: family, fontSize: size, fill: color, fontWeight: weight,
    align: 'center', dropShadow: true, dropShadowColor: 0x000000,
    dropShadowBlur: 8, dropShadowAlpha: 0.6, dropShadowDistance: 2,
  });
  t.anchor.set(0.5); t.resolution = 2;
  return t;
}
const MATH = "'Cambria Math', Cambria, Georgia, serif";

// — graph drawing helpers (deterministic per frame) —
function partialLine(g, A, B, prog) {
  if (prog <= 0) return;
  g.moveTo(A.x, A.y);
  g.lineTo(lerp(A.x, B.x, easeOut(prog)), lerp(A.y, B.y, easeOut(prog)));
}
function drawNodes(g, opts = {}) {
  for (let v = 0; v < n; v++) {
    const o = (opts.per && opts.per(v)) || {};
    const r = o.r ?? 13, col = o.col ?? 0xdfe6f5, glow = o.glow ?? 0;
    if (glow > 0) {
      g.beginFill(o.glowCol ?? C.gold, 0.10 * glow).drawCircle(N[v].x, N[v].y, r + 14 + 6 * glow).endFill();
    }
    g.lineStyle(0);
    g.beginFill(0x0b0e16, 1).drawCircle(N[v].x, N[v].y, r + 2.5).endFill();
    g.beginFill(col, 1).drawCircle(N[v].x, N[v].y, r).endFill();
  }
}

// Scene base: container with its own graphics + texts; full redraw each update
function makeGraphScene() {
  const c = new PIXI.Container();
  const g = new PIXI.Graphics();
  c.addChild(g);
  return { c, g };
}

// ════════════════════════════════════════════════════════════════════
// 3) SCENES
// ════════════════════════════════════════════════════════════════════
const scenes = [];
function scene(t0, t1, build) {
  const s = { t0, t1, _b: build, st: null };
  s.init = () => { s.st = build(); sceneLayer.addChild(s.st.c); };
  s.update = (lt) => s.st && s.st.update(lt, t1 - t0);
  s.destroy = () => { if (s.st) { sceneLayer.removeChild(s.st.c); s.st.c.destroy({ children: true }); s.st = null; } };
  scenes.push(s);
  return s;
}

// ── caption helper (top of stage) ──
function caption(c, str, color = C.gold, y = 52, size = 30) {
  const t = txt(str, size, color, '800');
  t.x = 640; t.y = y;
  c.addChild(t);
  return t;
}

// ────────────────────────────────────────────────────────────────────
// SCENE: INTRO  [0 – 16.4]
// ────────────────────────────────────────────────────────────────────
scene(0, 16.4, () => {
  const { c, g } = makeGraphScene();
  const t1 = txt('METRICKÝ TSP', 54, 0xdfe6f5); t1.x = 640; t1.y = 200;
  const t2 = txt('CHRISTOFIDES', 86, C.gold); t2.x = 640; t2.y = 300;
  const t3 = txt('≤ 3/2 · OPT', 64, C.cyan, '700', MATH); t3.x = 640; t3.y = 408;
  const q = txt('8 měst v rovině · cena = vzdálenost · najdi nejkratší okruh přes všechna', 24, C.muted, '600');
  q.x = 640; q.y = 660;
  c.addChild(t1, t2, t3, q);
  let fired = [false, false, false];
  return { c, update(lt) {
    t1.alpha = easeOut(ph(lt, 0.1, 0.9)); t1.scale.set(lerp(1.15, 1, easeOut(ph(lt, 0.1, 0.9))));
    t2.alpha = easeOut(ph(lt, 2.0, 2.8)); t2.scale.set(lerp(1.3, 1, easeOut(ph(lt, 2.0, 2.8))));
    t3.alpha = easeOut(ph(lt, 3.3, 4.0));
    if (!fired[0] && lt > 2.1) { fired[0] = true; burst(640, 300, C.gold, 26, 260, 0.13); }
    if (!fired[1] && lt > 3.4) { fired[1] = true; burst(640, 408, C.cyan, 22, 220, 0.11); }
    // beat pulse on 3/2
    t3.scale.set(1 + 0.05 * Math.max(0, Math.sin(lt * 4.4)));
    // graph fade-in from t=6
    const gp = ph(lt, 6, 12.5);
    const tShift = easeIO(ph(lt, 5.2, 7));
    t1.y = lerp(200, 92, tShift); t2.y = lerp(300, 92, tShift); t3.y = lerp(408, 92, tShift);
    t1.alpha *= (1 - tShift); t3.alpha *= (1 - tShift);
    t2.scale.set(lerp(1, 0.5, tShift));
    q.alpha = easeOut(ph(lt, 6.5, 7.5));
    g.clear();
    if (gp > 0) {
      // complete graph edges, staggered
      let idx = 0; const total = n * (n - 1) / 2;
      g.lineStyle(1.5, C.dim, 0.8);
      for (let a = 0; a < n; a++) for (let b = a + 1; b < n; b++) {
        const ep = ph(gp, idx / total * 0.7, idx / total * 0.7 + 0.3);
        partialLine(g, N[a], N[b], ep);
        idx++;
      }
      drawNodes(g, { per: v => ({ r: 13 * easeOut(ph(gp, v / n * 0.5, v / n * 0.5 + 0.25)), glow: 0.4 }) });
    }
    return;
  } };
});

// ────────────────────────────────────────────────────────────────────
// SCENE: VERSE 1  [16.4 – 37.08]  — kroky 1–3 algoritmu
// phases: A kostra 16.4–19.66 · B liché 19.66–25.08 · C sudost 25.08–32.4 · D matching 32.4–37.08
// ────────────────────────────────────────────────────────────────────
scene(16.4, 37.08, () => {
  const { c, g } = makeGraphScene();
  const cap = caption(c, '', C.gold);
  const sub = txt('', 21, C.muted, '600'); sub.x = 640; sub.y = 96; c.addChild(sub);
  const badge = txt(`|W| = ${W.length} — vždy SUDÝ počet`, 34, C.violet, '800'); badge.x = 640; badge.y = 152; badge.alpha = 0; c.addChild(badge);
  const why = txt('Σ deg(v) = 2|E|  ⇒  lichých vrcholů je sudě', 22, C.muted, '600', MATH); why.x = 640; why.y = 196; why.alpha = 0; c.addChild(why);
  const degTexts = N.map((p, v) => {
    const t = txt(String(degT[v]), 19, 0x0b0e16, '900');
    t.x = p.x; t.y = p.y; t.alpha = 0; c.addChild(t); return t;
  });
  let burstsDone = new Set();
  return { c, update(lt0) {
    const lt = lt0 + 16.4; // absolute
    g.clear();
    // faint complete graph
    g.lineStyle(1, C.dim, 0.45);
    for (let a = 0; a < n; a++) for (let b = a + 1; b < n; b++) { g.moveTo(N[a].x, N[a].y); g.lineTo(N[b].x, N[b].y); }
    // A: MST draw-on
    const pA = ph(lt, 16.4, 19.9);
    g.lineStyle(5, C.green, 1);
    mst.forEach(([a, b], i) => partialLine(g, N[a], N[b], ph(pA, i / mst.length * 0.75, i / mst.length * 0.75 + 0.25)));
    // B: odd vertices
    const pB = ph(lt, 19.9, 25.08);
    // D: matching
    const pD = ph(lt, 32.6, 36.9);
    g.lineStyle(5, C.pink, 1);
    M.forEach(([a, b], i) => partialLine(g, N[a], N[b], ph(pD, i / M.length * 0.6, i / M.length * 0.6 + 0.4)));
    // nodes
    drawNodes(g, { per: v => {
      const odd = W.includes(v);
      const wOn = odd && pB > (W.indexOf(v) / W.length) * 0.5;
      const pulse = wOn ? 0.6 + 0.4 * Math.sin(lt * 6 + v) : 0;

// ────────────────────────────────────────────────────────────────────
// SCENE FACTORY: CHORUS — pětikrokový checklist + 3/2 stamp
// part A: 5 slov · part B: 3/2·OPT + O(n³)
// ────────────────────────────────────────────────────────────────────
function chorusScene(t0, aEnd, t1) {
  scene(t0, t1, () => {
    const { c, g } = makeGraphScene();
    // mini graph s H okruhem v pozadí
    const mini = new PIXI.Container(); mini.scale.set(0.42); mini.x = 110; mini.y = 250; mini.alpha = 0.5;
    const mg = new PIXI.Graphics(); mini.addChild(mg); c.addChild(mini);
    const words = ['KOSTRA', 'LICHÉ', 'PÁROVÁNÍ', 'EULER', 'ZKRATKA'];
    const wcols = [C.green, C.gold, C.pink, C.cyan, C.violet];
    const fr = [0.20, 0.36, 0.42, 0.66, 0.73]; // word activation fractions of part A
    const wt = words.map((w, i) => {
      const t = txt(w, 74, wcols[i], '900');
      t.x = [240, 565, 935, 420, 800][i];
      t.y = [225, 225, 225, 380, 380][i];
      t.alpha = 0.13; c.addChild(t); return t;
    });
    const hot = txt('HOTOVO!', 56, C.white, '900'); hot.x = 640; hot.y = 510; hot.alpha = 0; hot.rotation = -0.06; c.addChild(hot);
    const big = txt('≤ 3/2 · OPT', 110, C.gold, '900', MATH); big.x = 640; big.y = 300; big.alpha = 0; c.addChild(big);
    const on3 = txt('O(n³)', 56, C.cyan, '800', MATH); on3.x = 640; on3.y = 432; on3.alpha = 0; c.addChild(on3);
    const who = txt('— CHRISTOFIDES 1976 —', 26, C.muted, '700'); who.x = 640; who.y = 510; who.alpha = 0; c.addChild(who);
    const fired = new Set();
    const aDur = aEnd - t0, bDur = t1 - aEnd;
    return { c, update(lt) {
      const inA = lt < aDur;
      const fA = clamp01(lt / aDur), fB = clamp01((lt - aDur) / bDur);
      wt.forEach((t, i) => {
        const on = fA >= fr[i];
        const targetA = inA ? (on ? 1 : 0.13) : Math.max(0, 0.5 - fB * 1.2);
        t.alpha += (targetA - t.alpha) * 0.25;
        const k = on && inA ? 1 + 0.10 * Math.max(0, 1 - (fA - fr[i]) * 9) : 1;
        t.scale.set(k);
        if (on && !fired.has(i)) { fired.add(i); burst(t.x, t.y, wcols[i], 20, 240, 0.11); }
      });
      hot.alpha = inA ? easeOut(ph(fA, 0.80, 0.88)) : Math.max(0, hot.alpha - 0.06);
      if (inA && fA > 0.80 && !fired.has('hot')) { fired.add('hot'); burst(640, 510, C.white, 24, 260, 0.1); }
      big.alpha = easeOut(ph(fB, 0.04, 0.18));
      big.scale.set(lerp(1.5, 1, easeOut(ph(fB, 0.04, 0.22))) * (1 + 0.04 * Math.sin(lt * 5)));
      on3.alpha = easeOut(ph(fB, 0.42, 0.55));
      who.alpha = easeOut(ph(fB, 0.62, 0.75));
      if (fB > 0.05 && !fired.has('big')) { fired.add('big'); burst(640, 300, C.gold, 36, 330, 0.15); }
      if (fB > 0.43 && !fired.has('on3')) { fired.add('on3'); burst(640, 432, C.cyan, 16, 200, 0.1); }
      // mini H cycle comet
      mg.clear();
      mg.lineStyle(4, C.gold, 0.8);
      Hedges.forEach(([a, b]) => { mg.moveTo(N[a].x, N[a].y); mg.lineTo(N[b].x, N[b].y); });
      drawNodes(mg, { per: () => ({ r: 12, glow: 0 }) });
      const hp = (lt * 0.14) % 1; // comet loops
      // comet point along H
      let total = 0; const lens = Hedges.map(([a, b]) => { const l = dist(a, b); total += l; return l; });
      let d = hp * total, px = N[Horder[0]].x, py = N[Horder[0]].y;
      for (let i = 0; i < Hedges.length; i++) {
        if (d <= lens[i]) { const [a, b] = Hedges[i]; const tt = d / lens[i]; px = lerp(N[a].x, N[b].x, tt); py = lerp(N[a].y, N[b].y, tt); break; }
        d -= lens[i];
      }
      mg.beginFill(C.goldHi, 1).drawCircle(px, py, 9).endFill();
      mini.alpha = inA ? 0.5 : Math.max(0.12, 0.5 - fB);
    } };
  });
}

    if (lt > 128.9 && !fired.has('fr')) { fired.add('fr'); burst(930, 560, C.gold, 28, 280, 0.12); }
    if (lt > 131.7 && !fired.has('win')) { fired.add('win'); burst(930, 640, C.green, 30, 300, 0.12); }
  } };
});

});

// ════════════════════════════════════════════════════════════════════
// 5) PLAYER / SCENE MANAGER / CONTROLS
// ════════════════════════════════════════════════════════════════════
const player = document.getElementById('player');
const subEl = document.getElementById('subtitle');
const bigplay = document.getElementById('bigplay');
const btnPlay = document.getElementById('btnPlay');
const btnRestart = document.getElementById('btnRestart');
const seek = document.getElementById('seek');
const tCur = document.getElementById('tCur');
const tDur = document.getElementById('tDur');

let curScene = null, lastLocal = -1, curLine = -1;
function tick() {
  const t = player.currentTime;
  // scene switch / rewind detection
  const s = scenes.find(sc => t >= sc.t0 && t < sc.t1) || scenes[scenes.length - 1];
  if (s !== curScene) { curScene && curScene.destroy(); curScene = s; s.init(); lastLocal = -1; }
  const localT = t - s.t0;
  if (localT < lastLocal - 0.05) { s.destroy(); s.init(); } // backward seek inside scene
  s.update(localT);
  lastLocal = localT;
  // subtitle
  const li = LINES.findIndex(([a, b]) => t >= a && t < b);
  if (li !== curLine) {
    curLine = li;
    subEl.innerHTML = li >= 0 ? LINES[li][2] : '';
    subEl.style.opacity = li >= 0 ? 1 : 0;
  }
  // controls
  if (!seekDragging) {
    seek.value = t;
    seek.style.setProperty('--p', (t / (player.duration || 161.4) * 100) + '%');
  }
  tCur.textContent = fmtTime(t);
  requestAnimationFrame(tick);
}
function fmtTime(t) { t = Math.max(0, t || 0); return `${Math.floor(t / 60)}:${String(Math.floor(t % 60)).padStart(2, '0')}`; }

let seekDragging = false;
seek.addEventListener('input', () => {
  seekDragging = true;
  player.currentTime = +seek.value;
  seek.style.setProperty('--p', (+seek.value / (player.duration || 161.4) * 100) + '%');
});
seek.addEventListener('change', () => { seekDragging = false; });

function togglePlay() {
  if (player.paused) { player.play(); } else { player.pause(); }
}
player.addEventListener('play', () => { btnPlay.textContent = '⏸'; bigplay.classList.add('hidden'); });
player.addEventListener('pause', () => { btnPlay.textContent = '▶'; if (player.currentTime < 0.05 || player.ended) bigplay.classList.remove('hidden'); });
player.addEventListener('ended', () => { bigplay.classList.remove('hidden'); bigplay.querySelector('.hint').innerHTML = 'Ještě jednou?<small>R = od začátku</small>'; });
player.addEventListener('loadedmetadata', () => {
  seek.max = player.duration;
  tDur.textContent = fmtTime(player.duration);
});

btnPlay.addEventListener('click', togglePlay);
btnRestart.addEventListener('click', () => { player.currentTime = 0; player.play(); });
bigplay.addEventListener('click', () => { player.play(); });
document.getElementById('stage').addEventListener('click', (e) => {
  if (e.target.closest('#bigplay')) return;
  togglePlay();
});
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  else if (e.code === 'ArrowRight') player.currentTime = Math.min(player.duration || 161, player.currentTime + 5);
  else if (e.code === 'ArrowLeft') player.currentTime = Math.max(0, player.currentTime - 5);
  else if (e.key === 'r' || e.key === 'R' || e.code === 'Home') { player.currentTime = 0; player.play(); }
});

requestAnimationFrame(tick);
})();
