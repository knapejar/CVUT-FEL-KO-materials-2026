<head>

<style>
  :root {
    --bg: #07090f;
    --panel: #11141d;
    --text: #e8eaf0;
    --muted: #8b93a7;
    --accent: #ffb000;
    --border: #232a3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; overflow: hidden;
  }
  #topbar {
    width: 100%; display: flex; align-items: center; gap: 12px;
    padding: 10px 18px; font-size: 13px; color: var(--muted);
  }
  #topbar a { color: var(--muted); text-decoration: none; }
  #topbar a:hover { color: var(--accent); }
  #topbar .title { color: var(--text); font-weight: 700; }
  #topbar .badge {
    font-size: 11px; color: var(--bg); background: var(--accent);
    border-radius: 10px; padding: 2px 9px; font-weight: 700;
  }
  #stagewrap {
    flex: 1; width: 100%; display: flex; align-items: center; justify-content: center;
    min-height: 0; padding: 0 16px;
  }
  #stage {
    position: relative;
    width: min(96vw, calc((100vh - 150px) * 16 / 9));
    aspect-ratio: 16 / 9;
    background: #0b0e16; border-radius: 12px; overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
  }
  #stage canvas { position: absolute; inset: 0; width: 100% !important; height: 100% !important; }
  /* ── karaoke pruh přes video, zarovnaný odspodu ── */
  #subtitle {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 26px 4% 16px;
    background: linear-gradient(to top, rgba(5,7,12,0.88) 0%, rgba(5,7,12,0.55) 65%, transparent 100%);
    text-align: center; pointer-events: none;
    font-size: clamp(15px, 2.6vw, 30px); font-weight: 700; line-height: 1.4;
    color: #fff;
  }
  #subtitle .m {
    font-family: 'Cambria Math', Cambria, Georgia, serif; font-style: italic;

  /* barevná notace 1:1 jako sekce „Zpívej“ ve zpěvníku */
  #subtitle .hl {
    font-family: 'Cambria Math', Cambria, Georgia, serif; font-style: italic;

  }
  #subtitle .c1 { background: rgba(125,211,252,0.15); color: #7dd3fc; }
  #subtitle .c2 { background: rgba(251,191,36,0.15);  color: #fbbf24; }
  #subtitle .c3 { background: rgba(52,211,153,0.15);  color: #4ade80; }
  #subtitle .c4 { background: rgba(167,139,250,0.18); color: #c4b5fd; }
  #subtitle .c5 { background: rgba(244,114,182,0.16); color: #f9a8d4; }
  #subtitle .c6 { background: rgba(251,146,60,0.17);  color: #fdba74; }
  /* karaoke wipe: dvě vrstvy — ztlumená základní + zlatá výplň jedoucí zleva doprava */
  .kw { position: relative; display: inline-block; white-space: nowrap; }
  .kw .wb { opacity: 0.42; text-shadow: 0 2px 10px rgba(0,0,0,0.9); }
  .kw .wf {
    position: absolute; left: 0; top: 0; width: 0%;
    overflow: hidden; white-space: nowrap;
    text-shadow: 0 0 16px rgba(255,176,0,0.85), 0 2px 10px rgba(0,0,0,0.95);
  }
  .kw .wf, .kw .wf * { color: #ffd34d !important; }
  #bigplay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(5,7,12,0.55); cursor: pointer; z-index: 5;
    flex-direction: column; gap: 18px;
  }
  #bigplay.hidden { display: none; }
  #bigplay .pbtn {
    width: 110px; height: 110px; border-radius: 50%;
    background: var(--accent); color: #1a1200;
    display: flex; align-items: center; justify-content: center;
    font-size: 44px; box-shadow: 0 0 60px rgba(255,176,0,0.45);
    transition: transform .15s;
  }
  #bigplay:hover .pbtn { transform: scale(1.08); }
  #bigplay .hint { color: var(--text); font-size: 15px; font-weight: 600; text-shadow: 0 2px 8px #000; }
  #bigplay .hint small { display: block; color: var(--muted); font-weight: 400; margin-top: 6px; }
  #controls {
    width: min(96vw, calc((100vh - 150px) * 16 / 9));
    display: flex; align-items: center; gap: 12px;
    padding: 12px 4px 16px;
  }
  #controls button {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    width: 42px; height: 42px; border-radius: 50%; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: border-color .15s, color .15s;
  }
  #controls button:hover { border-color: var(--accent); color: var(--accent); }
  #seek {
    flex: 1; -webkit-appearance: none; appearance: none; height: 6px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--p, 0%), #2a3040 var(--p, 0%));
    border-radius: 3px; outline: none; cursor: pointer;
  }
  #seek::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 10px rgba(255,176,0,0.6); cursor: pointer;
  }
  #seek::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%; border: none;
    background: var(--accent); cursor: pointer;
  }
  .time { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 44px; text-align: center; }
  @media (max-height: 560px) { #topbar { display: none; } }
</style>
</head>
<body>

<div id="topbar">
  <a href="pisnicky.html">← Zpěvník</a>
  <span class="title">Pro každé a existuje b (AC-3)</span>
  <span class="badge">IMMERSIVE VIDEO</span>
  <span style="margin-left:auto">mezerník = play/pauza · ←/→ = ±5 s · R = od začátku</span>
</div>

<div id="stagewrap">
  <div id="stage">
    <div id="subtitle"></div>
    <div id="bigplay">
      <div class="pbtn">▶</div>
      <div class="hint">AC-3 — hranová konzistence: definice, fronta, REVISE, neúplnost<small>1 min 54 s · zpívaná videolekce</small></div>
    </div>
  </div>
</div>

<div id="controls">
  <button id="btnPlay" title="Play / pauza">▶</button>
  <button id="btnRestart" title="Od začátku">⟲</button>
  <span class="time" id="tCur">0:00</span>
  <input type="range" id="seek" min="0" max="114.2" step="0.01" value="0">
  <span class="time" id="tDur">1:54</span>
</div>

<audio id="player" src="audio/konzistentni-fronta.mp3" preload="auto"></audio>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.3/dist/pixi.min.js"></script>
<script>
(async function () {
'use strict';

// ════════════════════════════════════════════════════════════════════
// 0) COLORS + helpers
// ════════════════════════════════════════════════════════════════════
const C = {
  bg: 0x0b0e16, gold: 0xffb000, goldHi: 0xffd34d, green: 0x4ade80,
  pink: 0xf472b6, cyan: 0x7dd3fc, violet: 0xa78bfa, white: 0xffffff,
  dim: 0x37415a, muted: 0x8b93a7, red: 0xef4444, card: 0x141927,
};
const clamp01 = v => Math.max(0, Math.min(1, v));
const lerp = (a, b, t) => a + (b - a) * t;
const easeOut = t => 1 - Math.pow(1 - clamp01(t), 3);
const ph = (t, a, b) => clamp01((t - a) / (b - a));

// ════════════════════════════════════════════════════════════════════
// 1) CSP INSTANCE + REAL AC-3 RUN (events hand-timed to word anchors)
//    x₁ < x₂ < x₃, all domains {1,2,3}
// ════════════════════════════════════════════════════════════════════
const VX = [230, 560, 890], VY = 340;
const VNAME = ['x₁', 'x₂', 'x₃'];
const VALS = [1, 2, 3];
// Real AC-3 trace (verified by hand): queue [(12),(21),(23),(32)]
//  revise(1→2): del 3 from D₁ (no re-enqueue: only in-edge (2,1) is from m)
//  revise(2→1): del 1 from D₂
//  revise(2→3): del 3 from D₂ → RE-ENQUEUE (1→2); (3→2) skipped (from m)
//  revise(3→2): del 1, del 2 from D₃
//  revise(1→2): del 2 from D₁ → queue empty, domains {1},{2},{3}
// Event kinds: qadd, qpop, qbounce (rejected re-enqueue), chk, del
const RUN = [
  { t: 49.2, k: 'qadd', e: '12' },
  { t: 50.1, k: 'qadd', e: '21' },
  { t: 51.0, k: 'qadd', e: '23' },
  { t: 51.9, k: 'qadd', e: '32' },
  { t: 53.2, k: 'qpop', e: '12' },                       // „vyber (k,m)“
  { t: 57.6, k: 'chk', v: 0, val: 1, ok: 1, sv: 1, sval: 2 },
  { t: 59.4, k: 'chk', v: 0, val: 2, ok: 1, sv: 1, sval: 3 },
  { t: 61.0, k: 'chk', v: 0, val: 3, ok: 0, sv: 1 },
  { t: 62.57, k: 'del', v: 0, val: 3 },                  // „VEN!“
  { t: 66.7, k: 'qbounce', e: '21' },                    // „jen tu od m ne!“
  { t: 69.3, k: 'qpop', e: '21' },
  { t: 70.2, k: 'chk', v: 1, val: 1, ok: 0, sv: 0 },
  { t: 71.3, k: 'del', v: 1, val: 1 },                   // „krásný den“
  // — bridge (72–91.5): běh pauzuje —
  { t: 91.8, k: 'qpop', e: '23' },
  { t: 92.8, k: 'chk', v: 1, val: 2, ok: 1, sv: 2, sval: 3 },
  { t: 94.8, k: 'chk', v: 1, val: 3, ok: 0, sv: 2 },
  { t: 97.35, k: 'del', v: 1, val: 3 },                  // „VEN!“
  { t: 99.2, k: 'qadd', e: '12' },                       // RE-ENQUEUE „vrať do fronty“
  { t: 101.8, k: 'qbounce', e: '32' },                   // „jen tu od m ne!“
  { t: 103.4, k: 'qpop', e: '32' },
  { t: 104.1, k: 'chk', v: 2, val: 1, ok: 0, sv: 1 },
  { t: 104.7, k: 'del', v: 2, val: 1 },                  // „krásný…
  { t: 105.1, k: 'chk', v: 2, val: 2, ok: 0, sv: 1 },
  { t: 105.7, k: 'del', v: 2, val: 2 },                  //  …den!“
  { t: 106.2, k: 'chk', v: 2, val: 3, ok: 1, sv: 1, sval: 2 },
  { t: 106.8, k: 'qpop', e: '12' },
  { t: 107.3, k: 'chk', v: 0, val: 1, ok: 1, sv: 1, sval: 2 },
  { t: 107.9, k: 'chk', v: 0, val: 2, ok: 0, sv: 1 },
  { t: 108.5, k: 'del', v: 0, val: 2 },
];
const EDGE_LABEL = { '12': 'x₁→x₂', '21': 'x₂→x₁', '23': 'x₂→x₃', '32': 'x₃→x₂' };
// state of run at time t (deterministic)
function runState(t) {
  const delT = {};       // 'v:val' -> time deleted
  const queue = [];      // [{e, tAdd}]
  const bounces = [];    // [{e, t}]
  let popped = null;     // {e, t}
  let check = null;      // active chk
  for (const ev of RUN) {
    if (ev.t > t) break;
    if (ev.k === 'qadd') queue.push({ e: ev.e, tAdd: ev.t });
    else if (ev.k === 'qpop') {
      const i = queue.findIndex(q => q.e === ev.e);
      if (i >= 0) queue.splice(i, 1);
      popped = { e: ev.e, t: ev.t };
    }
    else if (ev.k === 'qbounce') bounces.push({ e: ev.e, t: ev.t });
    else if (ev.k === 'del') delT[ev.v + ':' + ev.val] = ev.t;
    else if (ev.k === 'chk') check = { ...ev };
  }
  if (check && t > check.t + 1.7) check = null;
  return { delT, queue, bounces, popped, check };
}

// ════════════════════════════════════════════════════════════════════
// 2) PIXI SETUP
// ════════════════════════════════════════════════════════════════════
const app = new PIXI.Application({ width: 1280, height: 720, antialias: true, background: C.bg });
document.getElementById('stage').appendChild(app.view);
const starLayer = new PIXI.Container();
const sceneLayer = new PIXI.Container();
const fxLayer = new PIXI.Container();
app.stage.addChild(starLayer, sceneLayer, fxLayer);

const dotG = new PIXI.Graphics();
dotG.beginFill(0xffffff, 1).drawCircle(0, 0, 32).endFill();
const dotTex = app.renderer.generateTexture(dotG);
const stars = [];
for (let i = 0; i < 70; i++) {
  const s = new PIXI.Sprite(dotTex);
  s.anchor.set(0.5);
  s.x = Math.random() * 1280; s.y = Math.random() * 720;
  s.scale.set(0.015 + Math.random() * 0.035);
  s.alpha = 0.12 + Math.random() * 0.25;
  s.tint = Math.random() < 0.25 ? C.gold : 0x9fb4ff;
  s._vy = 2 + Math.random() * 6; s._tw = Math.random() * 6.28;
  starLayer.addChild(s); stars.push(s);
}
const parts = [];
function burst(x, y, tint, count = 18, speed = 220, size = 0.1) {
  for (let i = 0; i < count; i++) {
    const p = new PIXI.Sprite(dotTex);
    p.anchor.set(0.5); p.x = x; p.y = y; p.tint = tint;
    p.blendMode = PIXI.BLEND_MODES.ADD;
    const a = Math.random() * 6.283, v = speed * (0.3 + Math.random() * 0.8);
    p._vx = Math.cos(a) * v; p._vy = Math.sin(a) * v;
    p._life = 0.6 + Math.random() * 0.7; p._t = 0;
    p.scale.set(size * (0.5 + Math.random()));
    fxLayer.addChild(p); parts.push(p);
  }
}
app.ticker.add(() => {
  const dt = app.ticker.deltaMS / 1000;
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p._t += dt; p.x += p._vx * dt; p.y += p._vy * dt;
    p._vy += 220 * dt; p.alpha = clamp01(1 - p._t / p._life);
    if (p._t > p._life) { fxLayer.removeChild(p); p.destroy(); parts.splice(i, 1); }
  }
  for (const s of stars) {
    s.y += s._vy * dt; s._tw += dt * 2;
    s.alpha = 0.1 + 0.18 * (0.5 + 0.5 * Math.sin(s._tw));
    if (s.y > 730) { s.y = -10; s.x = Math.random() * 1280; }
  }
});
function txt(str, size, color, weight = '800', family = "'Segoe UI', system-ui, sans-serif") {
  const t = new PIXI.Text(str, {
    fontFamily: family, fontSize: size, fill: color, fontWeight: weight,
    align: 'center', dropShadow: true, dropShadowColor: 0x000000,
    dropShadowBlur: 8, dropShadowAlpha: 0.6, dropShadowDistance: 2,
  });
  t.anchor.set(0.5); t.resolution = 2;
  return t;
}
const MATH = "'Cambria Math', Cambria, Georgia, serif";

// curved directed edge with arrowhead
function arcEdge(g, x1, y1, x2, y2, bend, width, color, alpha) {
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  const dx = x2 - x1, dy = y2 - y1, l = Math.hypot(dx, dy);
  const cx = mx - dy / l * bend, cy = my + dx / l * bend;
  g.lineStyle(width, color, alpha);
  g.moveTo(x1, y1);
  g.quadraticCurveTo(cx, cy, x2, y2);
  // arrowhead from curve tangent at end
  const tx = x2 - cx, ty = y2 - cy, tl = Math.hypot(tx, ty);
  const ux = tx / tl, uy = ty / tl, hs = 10 + width;
  g.lineStyle(0);
  g.beginFill(color, alpha);
  g.moveTo(x2, y2);
  g.lineTo(x2 - ux * hs - uy * hs * 0.55, y2 - uy * hs + ux * hs * 0.55);
  g.lineTo(x2 - ux * hs + uy * hs * 0.55, y2 - uy * hs - ux * hs * 0.55);
  g.closePath().endFill();
  return { cx, cy };
}
function chipPos(v, val) { return { x: VX[v] + (val - 2) * 58, y: VY + 28 }; }

// ════════════════════════════════════════════════════════════════════
// 3) THE LAB — variable cards + domain chips + queue panel
//    fully re-rendered from runState(t)  → seek-safe
// ════════════════════════════════════════════════════════════════════
function buildLab(c) {
  const g = new PIXI.Graphics(); c.addChild(g);
  const chipT = [];
  for (let v = 0; v < 3; v++) for (const val of VALS) {
    const t = txt(String(val), 26, 0xffffff, '900');
    const P = chipPos(v, val); t.x = P.x; t.y = P.y; c.addChild(t);
    chipT.push({ v, val, t });
  }
  const nameT = VNAME.map((nm, v) => {
    const t = txt(nm, 30, C.cyan, '900', MATH); t.x = VX[v]; t.y = VY - 42; c.addChild(t); return t;
  });
  const qTitle = txt('FRONTA Q', 22, C.gold, '900'); qTitle.x = 1130; qTitle.y = 152; c.addChild(qTitle);
  const qChips = {}; // key e+tAdd index -> text
  const banner = txt('', 26, C.cyan, '800', MATH); banner.x = 560; banner.y = 116; c.addChild(banner);
  const bannerSub = txt('', 18, C.muted, '600'); bannerSub.x = 560; bannerSub.y = 150; c.addChild(bannerSub);
  const fired = new Set();
  const qSlotY = i => 195 + i * 52;

  function render(t, opts = {}) {
    const st = runState(t);
    g.clear();
    const A = opts.alpha ?? 1;
    if (A <= 0.01) { c.visible = false; return st; } else c.visible = true;
    c.alpha = A;
    // — variable cards —
    for (let v = 0; v < 3; v++) {
      g.lineStyle(2, C.dim, 1);
      g.beginFill(C.card, 0.92);
      g.drawRoundedRect(VX[v] - 110, VY - 70, 220, 140, 16);
      g.endFill();
    }
    // — constraint arcs (4 oriented edges) —
    const arcs = {
      '12': [VX[0] + 95, VY - 50, VX[1] - 95, VY - 50, -46],
      '21': [VX[1] - 95, VY + 50, VX[0] + 95, VY + 50, -46],
      '23': [VX[1] + 95, VY - 50, VX[2] - 95, VY - 50, -46],
      '32': [VX[2] - 95, VY + 50, VX[1] + 95, VY + 50, -46],
    };
    const activeE = st.popped && (!st.check || true) ? st.popped.e : null;
    for (const [e, [ax, ay, bx, by, bd]] of Object.entries(arcs)) {
      const on = e === activeE;
      arcEdge(g, ax, ay, bx, by, bd, on ? 5 : 3, on ? C.cyan : C.dim, on ? 1 : 0.8);
    }
    // constraint labels
    // (drawn once as texts? keep simple: re-usable static texts)
    if (!fired.has('clbl')) {
      fired.add('clbl');
      const mk = (s, x, y) => { const tt = txt(s, 22, C.violet, '800', MATH); tt.x = x; tt.y = y; c.addChild(tt); };
      mk('x₁ < x₂', (VX[0] + VX[1]) / 2, VY - 122);
      mk('x₂ < x₃', (VX[1] + VX[2]) / 2, VY - 122);
    }
    // — REVISE banner —
    if (st.popped && t < 108.6) {
      const [k, m] = st.popped.e.split('');
      banner.text = `REVISE(${EDGE_LABEL[st.popped.e]})`;
      bannerSub.text = `pro každé a ∈ D${'₁₂₃'[+k - 1]} hledám podporu b ∈ D${'₁₂₃'[+m - 1]}`;
      banner.alpha = bannerSub.alpha = opts.banner === false ? 0 : 1;
    } else { banner.alpha = 0; bannerSub.alpha = 0; }
    // — domain chips —
    for (const ch of chipT) {
      const key = ch.v + ':' + ch.val;
      const dT = st.delT[key];
      const P = chipPos(ch.v, ch.val);
      let cx = P.x, cy = P.y, rot = 0, al = 1, col = 0x202a40;
      const isChk = st.check && st.check.v === ch.v && st.check.val === ch.val;
      const isSup = st.check && st.check.ok && st.check.sv === ch.v && st.check.sval === ch.val && t > st.check.t + 0.45;
      if (dT !== undefined && t >= dT) {
        const p = clamp01((t - dT) / 1.15);
        cy += 470 * p * p; rot = p * (ch.val % 2 ? 2.3 : -2.0); al = 1 - p;
        col = C.red;
        if (!fired.has('d' + key)) { fired.add('d' + key); burst(P.x, P.y, C.red, 24, 280, 0.11); }
      } else if (isChk) {
        col = st.check.ok ? 0x14532d : 0x7f1d1d;
      } else if (isSup) col = 0x14532d;
      g.lineStyle(2, dT !== undefined && t >= dT ? C.red : (isChk ? (st.check.ok ? C.green : C.red) : 0x3b4663), al);
      g.beginFill(col, 0.95 * al);
      // rotated chip via manual polygon when falling (cheap: small rect rotation skipped — draw at offset)
      g.drawRoundedRect(cx - 22, cy - 22, 44, 44, 9);
      g.endFill();
      ch.t.x = cx; ch.t.y = cy; ch.t.alpha = al; ch.t.rotation = rot;
      // support line
      if (isChk && st.check.ok && t > st.check.t + 0.3) {
        const S = chipPos(st.check.sv, st.check.sval);
        const lp = ph(t, st.check.t + 0.3, st.check.t + 0.7);
        g.lineStyle(4, C.green, 0.9);
        g.moveTo(P.x, P.y);
        g.lineTo(lerp(P.x, S.x, easeOut(lp)), lerp(P.y, S.y, easeOut(lp)));
        if (lp >= 1 && !fired.has('s' + key + st.check.t)) { fired.add('s' + key + st.check.t); burst(S.x, S.y, C.green, 8, 130, 0.07); }
      }
      if (isChk && !st.check.ok && t > st.check.t + 0.3) {
        // failing sweep: red lines to every living chip of D_m
        g.lineStyle(3, C.red, 0.55);
        for (const val2 of VALS) {
          if (st.delT[st.check.sv + ':' + val2] !== undefined && t >= st.delT[st.check.sv + ':' + val2]) continue;
          const S = chipPos(st.check.sv, val2);
          g.moveTo(P.x, P.y); g.lineTo(S.x, S.y);
        }
      }
    }
    // — queue panel —
    g.lineStyle(2, C.gold, 0.5);
    g.beginFill(0x161208, 0.6);
    g.drawRoundedRect(1042, 170, 176, 290, 14);
    g.endFill();
    // queue chips (texts created lazily, positioned per state)
    st.queue.forEach((q, i) => {
      const id = q.e + '@' + q.tAdd;
      if (!qChips[id]) {
        const tt = txt(EDGE_LABEL[q.e], 21, 0xffffff, '800', MATH);
        c.addChild(tt); qChips[id] = tt;
      }
      const tt = qChips[id];
      const inP = easeOut(ph(t, q.tAdd, q.tAdd + 0.6));
      tt.x = lerp(700, 1130, inP); tt.y = qSlotY(i); tt.alpha = inP * A;
      g.lineStyle(2, q.tAdd > 95 ? C.pink : 0x4a3b14, tt.alpha);
      g.beginFill(0x1f1a0c, 0.9 * tt.alpha);
      g.drawRoundedRect(tt.x - 72, tt.y - 19, 144, 38, 8);
      g.endFill();
      if (q.tAdd > 95 && inP >= 1 && !fired.has('re' + id)) { fired.add('re' + id); burst(1130, qSlotY(i), C.pink, 16, 180, 0.09); }
    });
    // hide texts of chips no longer in queue
    for (const id of Object.keys(qChips)) {
      if (!st.queue.find(q => q.e + '@' + q.tAdd === id)) qChips[id].alpha = 0;
    }
    // bounce animation (rejected (m,k) re-enqueue)
    for (const b of st.bounces) {
      const p = (t - b.t) / 1.4;
      if (p < 0 || p > 1) continue;
      const [k] = b.e.split('');
      const from = { x: VX[+k - 1], y: VY };
      const target = { x: 1064, y: 195 };
      let bx2, by2;
      if (p < 0.45) { const q2 = easeOut(p / 0.45); bx2 = lerp(from.x, target.x, q2); by2 = lerp(from.y, target.y, q2); }
      else { const q2 = easeOut((p - 0.45) / 0.55); bx2 = lerp(target.x, from.x - 60, q2); by2 = lerp(target.y, from.y + 140, q2); }
      const al2 = p < 0.45 ? 1 : 1 - (p - 0.45) / 0.55;
      g.lineStyle(2, C.red, al2);
      g.beginFill(0x2a1010, 0.9 * al2);
      g.drawRoundedRect(bx2 - 72, by2 - 19, 144, 38, 8);
      g.endFill();
      if (!fired.has('bt' + b.t)) {
        fired.add('bt' + b.t);
        const tt = txt(EDGE_LABEL[b.e], 21, C.red, '800', MATH); tt._bounce = b.t; c.addChild(tt); qChips['b' + b.t] = tt;
      }
      const tt = qChips['b' + b.t];
      if (tt) { tt.x = bx2; tt.y = by2; tt.alpha = al2; }
      if (p > 0.45 && p < 0.6 && !fired.has('bx' + b.t)) { fired.add('bx' + b.t); burst(target.x, target.y, C.red, 18, 220, 0.1); }
      if (p > 0.45 && p < 1) {
        // NE! stamp
        if (!fired.has('bn' + b.t)) { fired.add('bn' + b.t); const ne = txt('to je od m — NE!', 24, C.red, '900'); ne.x = 1000; ne.y = 130; ne.rotation = -0.08; ne._bounce = b.t; c.addChild(ne); qChips['n' + b.t] = ne; }
        const ne = qChips['n' + b.t]; if (ne) ne.alpha = al2;
      } else if (qChips['n' + b.t]) qChips['n' + b.t].alpha = Math.max(0, qChips['n' + b.t].alpha - 0.05);
    }
    return st;
  }
  return { render };
}

const scenes = [];
function scene(t0, t1, build) {
  const s = { t0, t1, st: null };
  s.init = () => { s.st = build(); sceneLayer.addChild(s.st.c); };
  s.update = (lt) => s.st && s.st.update(lt);
  s.destroy = () => { if (s.st) { sceneLayer.removeChild(s.st.c); s.st.c.destroy({ children: true }); s.st = null; } };
  scenes.push(s);
  return s;
}
function caption(c, str, color = C.gold, y = 48, size = 28) {
  const t = txt(str, size, color, '800');
  t.x = 640; t.y = y; c.addChild(t);
  return t;
}
function makeC() { const c = new PIXI.Container(); const g = new PIXI.Graphics(); c.addChild(g); return { c, g }; }

function chorusScene(t0, t1, an, withLab) {
  scene(t0, t1, () => {

    const q1 = txt('škrtáš v Dₖ? → vrať hrany DO k', withLab ? 28 : 40, C.gold, '800', MATH); q1.x = withLab ? 590 : 640; q1.y = withLab ? 50 : 280; q1.alpha = 0;
    const q2 = txt('jen tu od m NE!', withLab ? 30 : 52, C.red, '900'); q2.x = withLab ? 950 : 640; q2.y = withLab ? 88 : 380; q2.alpha = 0;
    const ac = txt('AC-3', withLab ? 44 : 110, C.gold, '900'); ac.x = withLab ? 200 : 640; ac.y = withLab ? 96 : 300; ac.alpha = 0;
    const den = txt('krásný den! ☀', withLab ? 30 : 50, C.goldHi, '800'); den.x = withLab ? 200 : 640; den.y = withLab ? 140 : 430; den.alpha = 0;
    c.addChild(w1, w2, w3, q1, q2, ac, den);
    // demo chip ejection for chorus 1 (no lab yet)
    const demo = !withLab ? txt('7', 30, 0xffffff, '900') : null;
    if (demo) { demo.x = 640; demo.y = 520; c.addChild(demo); }
    const fired = new Set();
    return { c, update(lt0) {
      const lt = lt0 + t0;
      const inA = lt < an.maz;
      w1.alpha = lt > an.a ? 1 : 0;
      if (lt > an.a && !fired.has('a')) { fired.add('a'); burst(w1.x, w1.y, C.cyan, 26, 280, 0.13); }
      w1.scale.set(1 + 0.05 * Math.sin(lt * 6) * w1.alpha);

      w3.scale.set(lerp(1.6, 1, easeOut(ph(lt, an.ven - 0.15, an.ven + 0.35))));
      const inB = lt >= an.maz;

      q2.rotation = -0.06; q2.scale.set(lerp(1.5, 1, easeOut(ph(lt, an.ne, an.ne + 0.4))));
      ac.alpha = lt > an.ac ? 1 : 0;

      den.alpha = lt > an.den ? 1 : 0;
      if (lt > an.den && !fired.has('den')) { fired.add('den'); burst(den.x, den.y, C.goldHi, 30, 320, 0.13); }
      // chorus 1 demo: a value chip gets ejected on "VEN!"
      if (demo) {

}

// ════════════════════════════════════════════════════════════════════
// 6) PLAYER / SCENE MANAGER / CONTROLS
// ════════════════════════════════════════════════════════════════════
const player = document.getElementById('player');
const subEl = document.getElementById('subtitle');
const bigplay = document.getElementById('bigplay');
const btnPlay = document.getElementById('btnPlay');
const btnRestart = document.getElementById('btnRestart');
const seek = document.getElementById('seek');
const tCur = document.getElementById('tCur');
const tDur = document.getElementById('tDur');

let curScene = null, lastLocal = -1, curLine = -1;
let lineWords = []; // [{t0, t1, wf}] na slovo aktuálního řádku
// karaoke: rozsekej řádek na slova; každé slovo = dvě vrstvy (ztlumená + zlatá
// výplň), výplň jede zleva doprava v okně [t0,t1] ze SUNG (word-level whisper).
// Mapování slov proporcionálně podle pořadí — drží rytmus včetně pauz.
function buildKaraokeLine(li) {
  const [a, b, html] = LINES[li];
  const tokens = html.split(' ');
  const ww = SUNG.filter(w => w[0] >= a - 0.06 && w[0] < b && w[1] > w[0]);
  const pick = (i) => {
    if (!ww.length) {
      const step = (b - a) / tokens.length;
      return [a + step * i, a + step * (i + 1)];
    }
    const wi = tokens.length === 1 ? 0 : Math.round(i * (ww.length - 1) / (tokens.length - 1));
    return ww[wi];
  };
  subEl.innerHTML = tokens.map(tok =>
    `<span class="kw"><span class="wb">${tok}</span><span class="wf">${tok}</span></span>`).join(' ');
  const els = [...subEl.querySelectorAll('.kw')];
  lineWords = tokens.map((tok, i) => {
    const [t0, t1] = pick(i);
    return { t0, t1: Math.max(t1, t0 + 0.12), wf: els[i].querySelector('.wf') };
  });
}
function tick() {
  const t = player.currentTime;
  const s = scenes.find(sc => t >= sc.t0 && t < sc.t1) || scenes[scenes.length - 1];
  if (s !== curScene) { curScene && curScene.destroy(); curScene = s; s.init(); lastLocal = -1; }
  const localT = t - s.t0;
  if (localT < lastLocal - 0.05) { s.destroy(); s.init(); }
  s.update(localT);
  lastLocal = localT;
  const li = LINES.findIndex(([a, b]) => t >= a && t < b);
  if (li !== curLine) {
    curLine = li;
    if (li >= 0) buildKaraokeLine(li);
    else { subEl.innerHTML = ''; lineWords = []; }
    subEl.style.opacity = li >= 0 ? 1 : 0;
  }
  // per-frame karaoke wipe: zlatá výplň slova jede zleva doprava, když zní
  for (let i = 0; i < lineWords.length; i++) {
    const w = lineWords[i];
    const nextStart = i + 1 < lineWords.length ? lineWords[i + 1].t0 : w.t1;
    let p;
    if (t >= Math.max(w.t1, nextStart)) p = 1;
    else p = clamp01((t - w.t0) / (w.t1 - w.t0));
    w.wf.style.width = (p * 100).toFixed(1) + '%';
  }
  if (!seekDragging) {
    seek.value = t;
    seek.style.setProperty('--p', (t / (player.duration || 114.2) * 100) + '%');
  }
  tCur.textContent = fmtTime(t);
  requestAnimationFrame(tick);
}
function fmtTime(t) { t = Math.max(0, t || 0); return `${Math.floor(t / 60)}:${String(Math.floor(t % 60)).padStart(2, '0')}`; }

let seekDragging = false;
seek.addEventListener('input', () => {
  seekDragging = true;
  player.currentTime = +seek.value;
  seek.style.setProperty('--p', (+seek.value / (player.duration || 114.2) * 100) + '%');
});
seek.addEventListener('change', () => { seekDragging = false; });
function togglePlay() { if (player.paused) player.play(); else player.pause(); }
player.addEventListener('play', () => { btnPlay.textContent = '⏸'; bigplay.classList.add('hidden'); });
player.addEventListener('pause', () => { btnPlay.textContent = '▶'; if (player.currentTime < 0.05 || player.ended) bigplay.classList.remove('hidden'); });
player.addEventListener('ended', () => { bigplay.classList.remove('hidden'); bigplay.querySelector('.hint').innerHTML = 'Ještě jednou?<small>R = od začátku</small>'; });
player.addEventListener('loadedmetadata', () => {
  seek.max = player.duration;
  tDur.textContent = fmtTime(player.duration);
});
btnPlay.addEventListener('click', togglePlay);
btnRestart.addEventListener('click', () => { player.currentTime = 0; player.play(); });
bigplay.addEventListener('click', () => { player.play(); });
document.getElementById('stage').addEventListener('click', (e) => {
  if (e.target.closest('#bigplay')) return;
  togglePlay();
});
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  else if (e.code === 'ArrowRight') player.currentTime = Math.min(player.duration || 114, player.currentTime + 5);
  else if (e.code === 'ArrowLeft') player.currentTime = Math.max(0, player.currentTime - 5);
  else if (e.key === 'r' || e.key === 'R' || e.code === 'Home') { player.currentTime = 0; player.play(); }
});
requestAnimationFrame(tick);
})();
