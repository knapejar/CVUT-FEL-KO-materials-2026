<style>
  :root {

    --panel: #11141d;

    --muted: #8b93a7;
    --accent: #ffb000;
    --border: #232a3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; overflow: hidden;
  }
  #topbar {
    width: 100%; display: flex; align-items: center; gap: 12px;

  }
  #topbar a { color: var(--muted); text-decoration: none; }
  #topbar a:hover { color: var(--accent); }
  #topbar .title { color: var(--text); font-weight: 700; }

    position: relative;

  #bigplay {

  #bigplay.hidden { display: none; }
  #bigplay .pbtn {
    width: 110px; height: 110px; border-radius: 50%;

  #bigplay:hover .pbtn { transform: scale(1.08); }
  #bigplay .hint { color: var(--text); font-size: 15px; font-weight: 600; text-shadow: 0 2px 8px #000; }
  #bigplay .hint small { display: block; color: var(--muted); font-weight: 400; margin-top: 6px; }
  #controls {
    width: min(96vw, calc((100vh - 150px) * 16 / 9));

    padding: 12px 4px 16px;
  }
  #controls button {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);

  }
  #controls button:hover { border-color: var(--accent); color: var(--accent); }
  #seek {
    flex: 1; -webkit-appearance: none; appearance: none; height: 6px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--p, 0%), #2a3040 var(--p, 0%));
    border-radius: 3px; outline: none; cursor: pointer;

  #seek::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 10px rgba(255,176,0,0.6); cursor: pointer;
  }
  #seek::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%; border: none;

  }
  .time { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 44px; text-align: center; }
  @media (max-height: 560px) { #topbar { display: none; } }
</style>
</head>
<body>

<audio id="player" src="audio/ford-fulkerson-1956.mp3" preload="auto"></audio>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.3/dist/pixi.min.js"></script>
<script>
(async function () {
'use strict';

// ════════════════════════════════════════════════════════════════════
// 0) helpers
// ════════════════════════════════════════════════════════════════════
const C = {
  neonC: 0x39d7ff, neonM: 0xff3da6, neonG: 0x53ff9a, neonY: 0xffe34d,
  gold: 0xffb000, goldHi: 0xffd34d, red: 0xff3b3b, violet: 0xa78bfa,
  grid: 0x2a1d52, dark: 0x0a0716, steel: 0x9fb0c8, muted: 0x8b93a7,
  green: 0x4ade80, crt: 0x53ff9a,
};
const clamp01 = v => Math.max(0, Math.min(1, v));
const lerp = (a, b, t) => a + (b - a) * t;
const easeOut = t => 1 - Math.pow(1 - clamp01(t), 3);
const ph = (t, a, b) => clamp01((t - a) / (b - a));

// ════════════════════════════════════════════════════════════════════
// 1) SÍŤ S DOLNÍMI MEZEMI (ručně ověřená) + kotvy refrénů
//    max tok = min řez = 7;  A = {s,a}: C(A) = (4+5) − 2 = 7
// ════════════════════════════════════════════════════════════════════
const N = {
  s: { x: 225, y: 360 }, a: { x: 565, y: 232 },
  b: { x: 565, y: 498 }, t: { x: 1010, y: 360 },
};
const E = [
  { a: 's', b: 'a', l: 0, u: 6, f: 3 },
  { a: 's', b: 'b', l: 0, u: 4, f: 4 },  // VEN z A, plná
  { a: 'a', b: 't', l: 0, u: 5, f: 5 },  // VEN z A, plná
  { a: 'b', b: 't', l: 0, u: 5, f: 2 },
  { a: 'b', b: 'a', l: 2, u: 3, f: 2 },  // DOVNITŘ do A, na dolní mezi!
];
const OUT_IDX = [1, 2], IN_IDX = [4];
const ANCH = [
  { kap: 44.58, ven: 45.91, scit: 46.74, dol: 48.58, dov: 50.68, ode: 52.78, tok: 54.54, rov: 57.33, rez: 58.52, ford: 60.42, rok: 62.66 },
  { kap: 90.02, ven: 91.51, scit: 92.44, dol: 94.52, dov: 96.66, ode: 98.76, tok: 100.12, rov: 102.90, rez: 104.08, ford: 105.98, rok: 108.20 },
  { kap: 132.28, ven: 133.85, scit: 134.83, dol: 137.02, dov: 139.00, ode: 140.60, tok: 142.02, rov: 143.80, rez: 145.30, ford: 147.28, rok: 149.80 },
];

// ════════════════════════════════════════════════════════════════════
// 2) PIXI + particles + SHAKE + NEON WORD BUS (každé slovo = neon!)
// ════════════════════════════════════════════════════════════════════
const app = new PIXI.Application({ width: 1280, height: 720, antialias: true, background: 0x0a0716 });
document.getElementById('stage').appendChild(app.view);
const sceneLayer = new PIXI.Container();
const fxLayer = new PIXI.Container();
app.stage.addChild(sceneLayer, fxLayer);
let SHAKE = 0;
const dotG = new PIXI.Graphics();
dotG.beginFill(0xffffff, 1).drawCircle(0, 0, 32).endFill();
const dotTex = app.renderer.generateTexture(dotG);
const parts = [];
function burst(x, y, tint, count = 18, speed = 220, size = 0.1) {
  for (let i = 0; i < count; i++) {
    const p = new PIXI.Sprite(dotTex);
    p.anchor.set(0.5); p.x = x; p.y = y; p.tint = tint;
    p.blendMode = PIXI.BLEND_MODES.ADD;
    const a = Math.random() * 6.283, v = speed * (0.3 + Math.random() * 0.8);
    p._vx = Math.cos(a) * v; p._vy = Math.sin(a) * v;
    p._life = 0.6 + Math.random() * 0.7; p._t = 0;
    p.scale.set(size * (0.5 + Math.random()));
    fxLayer.addChild(p); parts.push(p);
  }
}
// NEON WORD: každé zazpívané slovo blikne jako neonový štít (flicker zářivky)
const neons = [];
let neonSlot = 0;
function spawnNeon(word, caps) {
  const plain = word.replace(/<[^>]*>/g, '').replace(/[„“…—]/g, '').trim();
  if (!plain) return;
  const big = caps || /!$/.test(plain);
  const palette = big ? ['#ffffff', '#ff3da6'] : (neonSlot % 2 ? ['#bff3ff', '#39d7ff'] : ['#ffe9fb', '#ff3da6']);
  const t = new PIXI.Text(plain.toUpperCase(), {
    fontFamily: "'Segoe UI', system-ui, sans-serif",
    fontSize: big ? 44 : 24, fontWeight: '900',
    fill: palette, stroke: 0x12041f, strokeThickness: big ? 7 : 4,
    dropShadow: true, dropShadowColor: big ? 0xff3da6 : 0x39d7ff,
    dropShadowBlur: 16, dropShadowDistance: 0,
  });
  t.anchor.set(0.5); t.resolution = 2;
  neonSlot = (neonSlot + 1) % 6;
  t.x = big ? 640 : 150 + neonSlot * 195 + (Math.random() - 0.5) * 46;
  t.y = big ? 540 : 660;
  t._vy = big ? -95 : -62 - Math.random() * 30;
  t._life = big ? 1.5 : 1.15; t._t = 0; t._big = big;
  fxLayer.addChild(t); neons.push(t);
  burst(t.x, t.y, big ? C.neonM : C.neonC, big ? 18 : 6, big ? 220 : 100, big ? 0.1 : 0.05);
  if (big) SHAKE = Math.max(SHAKE, 8);
}
app.ticker.add(() => {
  const dt = app.ticker.deltaMS / 1000;
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p._t += dt; p.x += p._vx * dt; p.y += p._vy * dt;
    p._vy += 200 * dt; p.alpha = clamp01(1 - p._t / p._life);
    if (p._t > p._life) { fxLayer.removeChild(p); p.destroy(); parts.splice(i, 1); }
  }
  for (let i = neons.length - 1; i >= 0; i--) {
    const n = neons[i];
    n._t += dt; n.y += n._vy * dt; n._vy *= 0.985;
    const k = n._t / n._life;
    // flicker zapínání jako stará zářivka
    n.alpha = k < 0.22 ? (Math.random() < 0.45 ? 0.15 : 1) * (k / 0.22) : 1 - ph(k, 0.5, 1);
    if (n._t > n._life) { fxLayer.removeChild(n); n.destroy(); neons.splice(i, 1); }
  }
  if (SHAKE > 0.1) {
    sceneLayer.x = (Math.random() - 0.5) * SHAKE;
    sceneLayer.y = (Math.random() - 0.5) * SHAKE;
    SHAKE *= Math.pow(0.0018, dt);
  } else { sceneLayer.x = 0; sceneLayer.y = 0; }
});
function txt(str, size, color, weight = '800', family = "'Segoe UI', system-ui, sans-serif") {
  const t = new PIXI.Text(str, {
    fontFamily: family, fontSize: size, fill: color, fontWeight: weight,
    align: 'center', dropShadow: true, dropShadowColor: 0x000000,
    dropShadowBlur: 8, dropShadowAlpha: 0.6, dropShadowDistance: 2,
  });
  t.anchor.set(0.5); t.resolution = 2;
  return t;
}
const MATH = "'Cambria Math', Cambria, Georgia, serif";

// PD foto přehrady (min cut IRL) — viz assets/img/CREDITS.txt
let damTex = null;
try { damTex = await PIXI.Assets.load('assets/img/dam.jpg'); } catch (e) { console.warn('dam load failed', e); }

// ════════════════════════════════════════════════════════════════════
// 3) WAR ROOM + SÍŤOVÁ TABULE + OPONA + CRT TERMINÁL
// ════════════════════════════════════════════════════════════════════
function buildRoom(c) {
  const g = new PIXI.Graphics(); c.addChildAt(g, 0);
  const west = txt('WEST  ⟶', 20, C.neonC, '900'); west.x = 130; west.y = 96; c.addChild(west);
  const east = txt('⟶  EAST', 20, C.neonM, '900'); east.x = 1150; east.y = 96; c.addChild(east);
  function render(t, o = {}) {
    g.clear();
    // pozadí
    g.beginFill(0x0a0716, 1).drawRect(0, 0, 1280, 720).endFill();
    g.beginFill(0x150b2e, 1).drawRect(0, 0, 1280, 130).endFill();
    // neonová podlahová mřížka (perspektiva)
    g.lineStyle(2, C.grid, 0.8);
    for (let i = 0; i <= 12; i++) {
      const x = i * 1280 / 12;
      g.moveTo(x, 720); g.lineTo(640 + (x - 640) * 0.25, 560);
    }
    for (let i = 0; i < 5; i++) {
      const yy = 560 + Math.pow(i / 4, 1.6) * 160;
      g.moveTo(0, yy); g.lineTo(1280, yy);
    }
    // horizont glow
    g.beginFill(C.neonM, 0.06).drawRect(0, 540, 1280, 30).endFill();
    // radar v rohu
    const rx = 96, ry = 622, rr = 56;
    g.lineStyle(2, C.neonG, 0.7);
    g.drawCircle(rx, ry, rr); g.drawCircle(rx, ry, rr * 0.62); g.drawCircle(rx, ry, rr * 0.3);
    const swp = t * 1.6;
    g.lineStyle(0);
    g.beginFill(C.neonG, 0.25);
    g.moveTo(rx, ry);
    g.arc(rx, ry, rr, swp, swp + 0.6);
    g.closePath().endFill();
    // blip = easter egg tečka
    g.beginFill(C.neonG, 0.5 + 0.5 * Math.sin(t * 3)).drawCircle(rx + 24, ry - 18, 3).endFill();
    // scanlines (jemné)
    g.lineStyle(1, 0x000000, 0.18);
    const off = (t * 40) % 8;
    for (let y = -8 + off; y < 720; y += 8) { g.moveTo(0, y); g.lineTo(1280, y); }
  }
  return { render };
}
function buildBoard(c) {
  const g = new PIXI.Graphics(); c.addChild(g);
  const labT = {};
  for (const [id, P] of Object.entries(N)) {
    labT[id] = txt(id, 24, 0x0b0e16, '900'); labT[id].x = P.x; labT[id].y = P.y; c.addChild(labT[id]);
  }
  const eT = E.map((e, i) => {
    const A = N[e.a], B = N[e.b];
    const mx = (A.x + B.x) / 2, my = (A.y + B.y) / 2;
    const dx = B.x - A.x, dy = B.y - A.y, l2 = Math.hypot(dx, dy);
    const tt = txt('', 19, C.steel, '800', MATH);
    tt.x = mx - dy / l2 * 26; tt.y = my + dx / l2 * 26;
    c.addChild(tt); return tt;
  });
  function render(t, o = {}) {
    g.clear();
    // hrany + tok
    E.forEach((e, i) => {
      const A = N[e.a], B = N[e.b];
      const isOut = OUT_IDX.includes(i), isIn = IN_IDX.includes(i);
      let col = 0x4a3f73, wd = 4, al = 0.95;
      if (o.outHL && isOut && t > o.outHL) { col = C.neonC; wd = 6; }
      if (o.inHL && isIn && t > o.inHL) { col = C.red; wd = 6; }
      if (o.deadHL && o.deadHL.includes(i)) { col = C.red; wd = 5; al = 0.5 + 0.4 * Math.sin(t * 8); }
      g.lineStyle(wd, col, al);
      g.moveTo(A.x, A.y); g.lineTo(B.x, B.y);
      // šipka
      const ux = (B.x - A.x) / Math.hypot(B.x - A.x, B.y - A.y), uy = (B.y - A.y) / Math.hypot(B.x - A.x, B.y - A.y);
      const hx = B.x - ux * 36, hy = B.y - uy * 36, hs = 13;
      g.lineStyle(0); g.beginFill(col, al);
      g.moveTo(hx, hy);
      g.lineTo(hx - ux * hs - uy * hs * 0.55, hy - uy * hs + ux * hs * 0.55);
      g.lineTo(hx - ux * hs + uy * hs * 0.55, hy - uy * hs - ux * hs * 0.55);
      g.closePath().endFill();
      // tok = neonové částice (rychlost ∝ f)
      if (o.flow && e.f > 0) {
        const cnt = e.f;
        for (let k2 = 0; k2 < cnt; k2++) {
          const p = ((t * 0.12 * e.f + k2 / cnt) % 1);
          g.beginFill(C.neonY, 0.9);
          g.drawCircle(lerp(A.x, B.x, p), lerp(A.y, B.y, p), 4.5);
          g.endFill();
        }
      }
      // popisky f/u + dolní mez
      eT[i].text = (o.showF ? `${e.f}/` : '') + `${e.u}` + (e.l > 0 ? `  l=${e.l}` : '');
      eT[i].style.fill = isIn ? 0xff9a9a : (isOut ? 0xbff3ff : C.steel);
    });
    // uzly
    for (const [id, P] of Object.entries(N)) {
      const inA = id === 's' || id === 'a';
      const marked = o.markA && (id === 's' ? t > o.markA : (id === 'a' ? t > o.markA + 1.2 : false));
      g.lineStyle(0);
      if (marked || (o.glowA && inA)) g.beginFill(C.goldHi, 0.16 + 0.08 * Math.sin(t * 4)).drawCircle(P.x, P.y, 44).endFill();
      g.beginFill(0x0a0716, 1).drawCircle(P.x, P.y, 25).endFill();
      g.beginFill(marked || (o.glowA && inA) ? C.goldHi : (id === 's' ? C.neonC : (id === 't' ? C.neonM : C.steel)), 1).drawCircle(P.x, P.y, 20).endFill();
    }
    // OPONA = min řez (zubatá neonová čára oddělující {s,a})
    if (o.curtain > 0) {
      const cp = o.curtain;
      g.lineStyle(7, o.curtainGold ? C.goldHi : C.neonM, 0.9 * cp);
      const pts = [[860, 96], [800, 200], [840, 300], [760, 400], [800, 500], [700, 600], [730, 660]];
      g.moveTo(pts[0][0], pts[0][1]);
      for (let i = 1; i < pts.length * cp; i++) {
        if (!pts[i]) break;
        g.lineTo(pts[i][0], pts[i][1]);
      }
    }
  }
  return { render };
}
// CRT terminál (bridge + razítko 1956)
function buildCRT(c) {
  const wrap = new PIXI.Container(); wrap.alpha = 0; c.addChild(wrap);
  const g = new PIXI.Graphics(); wrap.addChild(g);
  g.lineStyle(4, 0x3a4a3f, 1);
  g.beginFill(0x06140a, 0.96);
  g.drawRoundedRect(240, 150, 800, 360, 16);
  g.endFill();
  g.lineStyle(2, 0x53ff9a, 0.25);
  for (let y = 160; y < 505; y += 6) { g.moveTo(244, y); g.lineTo(1036, y); }
  const lines = [];
  for (let i = 0; i < 5; i++) {
    const t = new PIXI.Text('', { fontFamily: 'Consolas, monospace', fontSize: 26, fill: 0x53ff9a, fontWeight: '700' });
    t.x = 280; t.y = 190 + i * 56; t.resolution = 2; wrap.addChild(t); lines.push(t);
  }
  function render(t, o = {}) {
    wrap.alpha = o.on ? easeOut(ph(t, o.on, o.on + 0.5)) : 0;
    if (!o.on) return;
    const msgs = o.msgs || [];
    msgs.forEach(([at, s], i) => {
      if (i >= lines.length) return;
      const n = Math.floor(ph(t, at, at + Math.max(0.8, s.length * 0.045)) * s.length);
      lines[i].text = n > 0 ? '> ' + s.slice(0, n) + (n < s.length ? '█' : '') : '';
    });
  }
  return { render };
}

const scenes = [];
function scene(t0, t1, build) {
  const s = { t0, t1, st: null };
  s.init = () => { s.st = build(); sceneLayer.addChild(s.st.c); };
  s.update = (lt) => s.st && s.st.update(lt);
  s.destroy = () => { if (s.st) { sceneLayer.removeChild(s.st.c); s.st.c.destroy({ children: true }); s.st = null; } };
  scenes.push(s);
  return s;
}
function caption(c, str, color = C.neonY, y = 42, size = 25) {
  const t = txt(str, size, color, '800');
  t.x = 640; t.y = y; c.addChild(t);
  return t;
}

    const ff = txt('FORD ★ FULKERSON', 30, C.neonM, '900'); ff.x = 640; ff.y = 268; ff.alpha = 0; c.addChild(ff);
    // PD foto přehrady — „min cut IRL“
    let damW = null;
    if (damTex) {
      damW = new PIXI.Container(); damW.x = 1105; damW.y = 565; damW.alpha = 0; c.addChild(damW);
      const fg = new PIXI.Graphics();
      fg.lineStyle(5, C.neonC, 1); fg.beginFill(0x0a0716, 1); fg.drawRoundedRect(-95, -78, 190, 156, 8); fg.endFill();
      damW.addChild(fg);
      const spr = new PIXI.Sprite(damTex); spr.anchor.set(0.5); spr.width = 178; spr.height = 124; spr.y = -8; damW.addChild(spr);
      const lab = txt('min cut IRL', 16, C.neonC, '800'); lab.y = 62; damW.addChild(lab);
    }
    const fired = new Set();
    return { c, update(lt0) {
      const lt = lt0 + t0;
      room.render(lt);
      board.render(lt, {
        flow: true, showF: false, glowA: true,
        curtain: 1,
        outHL: lt > an.ven ? an.ven : 0,
        inHL: lt > an.dov ? an.dov : 0,
        curtainGold: lt > an.rez,
      });
      // +4/+5 letí od hran k počítadlu (na „ven“/„sčítají“)
      const fly = (el, from, p2) => { el.alpha = p2 > 0 && p2 < 1 ? 1 : (p2 >= 1 ? 0.9 : 0); el.x = lerp(from.x, 640, easeOut(p2)); el.y = lerp(from.y, 120, easeOut(p2)); };
      fly(plus1, { x: 395, y: 430 }, ph(lt, an.scit, an.scit + 0.8));
      fly(plus2, { x: 790, y: 295 }, ph(lt, an.scit + 0.3, an.scit + 1.1));
      fly(minus1, { x: 565, y: 365 }, ph(lt, an.ode, an.ode + 0.8));

      // rovnice na „tok se rovná řezu“
      eq.alpha = lt > an.rov ? 1 : 0;
      eq.scale.set(lerp(1.5, 1, easeOut(ph(lt, an.rov, an.rov + 0.5))));
      if (lt > an.rov + 0.05 && !fired.has('eq')) { fired.add('eq'); burst(640, 560, C.neonY, 24, 260, 0.12); }

      ff.alpha = lt > an.ford ? 1 : 0;
      stamp.alpha = lt > an.rok ? 1 : 0;
      stamp.scale.set(lerp(2.4, 1, easeOut(ph(lt, an.rok, an.rok + 0.4))));
      if (lt > an.rok + 0.02 && !fired.has('st')) { fired.add('st'); SHAKE = 14; burst(640, 350, 0xffffff, 40, 360, 0.15); }
      // přehrada
      if (damW) {
        damW.alpha = lt > an.kap && lt < an.ford ? easeOut(ph(lt, an.kap, an.kap + 0.6)) : Math.max(0, damW.alpha - 0.04);

      else if (lt < an.tok) { cap.text = 'dolní meze hran DOVNITŘ se ODEČTOU: −2'; cap.style.fill = C.red; }

      else { cap.text = 'Ford & Fulkerson, 1956 — narozeno ve studené válce'; cap.style.fill = 0xffffff; }
    } };
  });
}

function tokenize(html) {
  const out = []; let cur = ''; let inTag = false;
  for (const ch of html) {
    if (ch === '<') inTag = true;
    else if (ch === '>') inTag = false;
    if (ch === ' ' && !inTag) { if (cur) out.push(cur); cur = ''; }
    else cur += ch;
  }
  if (cur) out.push(cur);
  return out;
}
function isCapsToken(tok) {
  const plain = tok.replace(/<[^>]*>/g, '');
  const letters = plain.replace(/[^a-zA-ZáčďéěíňóřšťúůýžÁČĎÉĚÍŇÓŘŠŤÚŮÝŽ]/g, '');
  return letters.length >= 2 && letters === letters.toUpperCase();
}

  const [a, b, html] = LINES[li];
  const tokens = tokenize(html);
  const ww = SUNG.filter(w => w[0] >= a - 0.06 && w[0] < b && w[1] > w[0]);
  const pick = (i) => {
    if (!ww.length) {
      const step = (b - a) / tokens.length;
      return [a + step * i, a + step * (i + 1)];
    }
    const wi = tokens.length === 1 ? 0 : Math.round(i * (ww.length - 1) / (tokens.length - 1));
    return ww[wi];
  };
  subEl.innerHTML = tokens.map(tok =>
    `<span class="kw"><span class="wb">${tok}</span><span class="wf">${tok}</span></span>`).join(' ');
  const els = [...subEl.querySelectorAll('.kw')];
  lineWords = tokens.map((tok, i) => {
    const [t0, t1] = pick(i);
    return { t0, t1: Math.max(t1, t0 + 0.12), wf: els[i] ? els[i].querySelector('.wf') : null, tok, caps: isCapsToken(tok) };
  });
}
function tick() {
  const t = player.currentTime;
  const s = scenes.find(sc => t >= sc.t0 && t < sc.t1) || scenes[scenes.length - 1];
  if (s !== curScene) { curScene && curScene.destroy(); curScene = s; s.init(); lastLocal = -1; }
  const localT = t - s.t0;
  if (localT < lastLocal - 0.05) { s.destroy(); s.init(); }
  s.update(localT);
  lastLocal = localT;
  const li = LINES.findIndex(([a, b]) => t >= a && t < b);
  if (li !== curLine) {
    curLine = li;
    if (li >= 0) buildKaraokeLine(li);
    else { subEl.innerHTML = ''; lineWords = []; }
    subEl.style.opacity = li >= 0 ? 1 : 0;
  }
  // NEON WORD BUS — každé slovo blikne jako neon přesně v t0
  if (!player.paused && t > lastT && t - lastT < 0.5) {
    for (const w of lineWords) {
      if (w.t0 > lastT && w.t0 <= t) spawnNeon(w.tok, w.caps);
    }
  }
  lastT = t;
  for (let i = 0; i < lineWords.length; i++) {
    const w = lineWords[i];
    if (!w.wf) continue;
    const nextStart = i + 1 < lineWords.length ? lineWords[i + 1].t0 : w.t1;
    let p;
    if (t >= Math.max(w.t1, nextStart)) p = 1;
    else p = clamp01((t - w.t0) / (w.t1 - w.t0));
    w.wf.style.width = (p * 100).toFixed(1) + '%';
  }
  if (!seekDragging) {
    seek.value = t;
    seek.style.setProperty('--p', (t / (player.duration || 167.6) * 100) + '%');
  }
  tCur.textContent = fmtTime(t);
  requestAnimationFrame(tick);
}
function fmtTime(t) { t = Math.max(0, t || 0); return `${Math.floor(t / 60)}:${String(Math.floor(t % 60)).padStart(2, '0')}`; }

let seekDragging = false;
seek.addEventListener('input', () => {
  seekDragging = true;
  player.currentTime = +seek.value;
  seek.style.setProperty('--p', (+seek.value / (player.duration || 167.6) * 100) + '%');
});
seek.addEventListener('change', () => { seekDragging = false; });
function togglePlay() { if (player.paused) player.play(); else player.pause(); }
player.addEventListener('play', () => { btnPlay.textContent = '⏸'; bigplay.classList.add('hidden'); });
player.addEventListener('pause', () => { btnPlay.textContent = '▶'; if (player.currentTime < 0.05 || player.ended) bigplay.classList.remove('hidden'); });
player.addEventListener('ended', () => { bigplay.classList.remove('hidden'); bigplay.querySelector('.hint').innerHTML = 'Ještě jednou?<small>R = od začátku</small>'; });
player.addEventListener('loadedmetadata', () => {
  seek.max = player.duration;
  tDur.textContent = fmtTime(player.duration);
});
btnPlay.addEventListener('click', togglePlay);
btnRestart.addEventListener('click', () => { player.currentTime = 0; player.play(); });
bigplay.addEventListener('click', () => { player.play(); });
document.getElementById('stage').addEventListener('click', (e) => {
  if (e.target.closest('#bigplay')) return;
  togglePlay();
});
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  else if (e.code === 'ArrowRight') player.currentTime = Math.min(player.duration || 167, player.currentTime + 5);
  else if (e.code === 'ArrowLeft') player.currentTime = Math.max(0, player.currentTime - 5);
  else if (e.key === 'r' || e.key === 'R' || e.code === 'Home') { player.currentTime = 0; player.play(); }
});
requestAnimationFrame(tick);
})();
</script>
