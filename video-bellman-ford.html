<style>
  :root {
    --bg: #07090f;
    --panel: #11141d;
    --text: #e8eaf0;
    --muted: #8b93a7;
    --accent: #ffb000;
    --border: #232a3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; overflow: hidden;
  }
  #topbar {

  .kw { position: relative; display: inline-block; white-space: nowrap; }

  #controls {

  @media (max-height: 560px) { #topbar { display: none; } }

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.3/dist/pixi.min.js"></script>
<script>
(async function () {
'use strict';

// ════════════════════════════════════════════════════════════════════
// 0) helpers
// ════════════════════════════════════════════════════════════════════
const C = {
  gold: 0xffb000, goldHi: 0xffd34d, green: 0x4ade80, pink: 0xf472b6,
  cyan: 0x7dd3fc, violet: 0xa78bfa, white: 0xffffff, red: 0xef4444,
  dim: 0x2b3550, muted: 0x8b93a7, sand: 0xe8c98a, sandDark: 0xc9a96b,
  trunk: 0x8a5a2b, leaf: 0x2f9e55, sea: 0x10395e, seaHi: 0x1c5d8f,
};
const clamp01 = v => Math.max(0, Math.min(1, v));
const lerp = (a, b, t) => a + (b - a) * t;
const easeOut = t => 1 - Math.pow(1 - clamp01(t), 3);
const ph = (t, a, b) => clamp01((t - a) / (b - a));

// ════════════════════════════════════════════════════════════════════
// 1) GRAF + REÁLNÝ BĚH (pořadí hran schválně „proti srsti“ → n−1 kol)
//    5 vrcholů ⇒ n−1 = 4 kola; záporné hrany (Dijkstra by selhal)
// ════════════════════════════════════════════════════════════════════
const NODES = {
  s: { x: 175, y: 455 }, a: { x: 395, y: 295 }, b: { x: 565, y: 500 },
  c: { x: 800, y: 320 }, t: { x: 1045, y: 470 },
};
// hrany v PEVNÉM pořadí relaxace (zprava doleva — nejhorší případ)
const EDGES = [
  { a: 'c', b: 't', w: -1 },
  { a: 'b', b: 'c', w: 4 },
  { a: 'a', b: 'b', w: -3 },
  { a: 's', b: 'a', w: 2 },
  { a: 's', b: 'b', w: 1 },
  { a: 'a', b: 'c', w: 6 },
  { a: 'b', b: 't', w: 7 },
];
// zlepšení po kolech (ručně ověřeno; e = index hrany v EDGES)
const ROUNDS = [
  [{ e: 3, n: 'a', v: 2 }, { e: 4, n: 'b', v: 1 }, { e: 5, n: 'c', v: 8 }, { e: 6, n: 't', v: 8 }],
  [{ e: 0, n: 't', v: 7 }, { e: 1, n: 'c', v: 5 }, { e: 2, n: 'b', v: -1 }, { e: 6, n: 't', v: 6 }],
  [{ e: 0, n: 't', v: 4 }, { e: 1, n: 'c', v: 3 }],
  [{ e: 0, n: 't', v: 2 }],
];
const FINAL = { s: 0, a: 2, b: -1, c: 3, t: 2 };
const BESTPATH = ['s', 'a', 'b', 'c', 't']; // 2−3+4−1 = 2
// časová okna vln (kolo 1 ve sloce, 2–4 v refrénu 1)
const WAVES = [
  { r: 0, t0: 19.0, t1: 25.4 },
  { r: 1, t0: 38.9, t1: 44.2 },
  { r: 2, t0: 44.6, t1: 50.8 },
  { r: 3, t0: 51.1, t1: 57.1 },
];
// stav labelů v čase t (deterministický, seek-safe)
function labelsAt(t) {
  const lab = { s: 0, a: Infinity, b: Infinity, c: Infinity, t: Infinity };
  let waveX = null, flashE = -1, curRound = 0;
  for (const w of WAVES) {
    if (t >= w.t1) { for (const im of ROUNDS[w.r]) lab[im.n] = im.v; curRound = w.r + 1; }
    else if (t >= w.t0) {
      const p = ph(t, w.t0, w.t1);
      waveX = lerp(60, 1220, p);
      flashE = Math.min(EDGES.length - 1, Math.floor(p * EDGES.length));
      for (const im of ROUNDS[w.r]) {
        const fT = w.t0 + (im.e + 0.6) / EDGES.length * (w.t1 - w.t0);
        if (t >= fT) lab[im.n] = im.v;
      }
      curRound = w.r + 1;
      break;
    } else break;
  }
  return { lab, waveX, flashE, curRound };
}
const fmtL = v => v === Infinity ? '∞' : String(v);

// ════════════════════════════════════════════════════════════════════
// 2) PIXI + particles
// ════════════════════════════════════════════════════════════════════
const app = new PIXI.Application({ width: 1280, height: 720, antialias: true, background: 0x0b0e16 });
document.getElementById('stage').appendChild(app.view);
const sceneLayer = new PIXI.Container();
const fxLayer = new PIXI.Container();
app.stage.addChild(sceneLayer, fxLayer);
const dotG = new PIXI.Graphics();
dotG.beginFill(0xffffff, 1).drawCircle(0, 0, 32).endFill();
const dotTex = app.renderer.generateTexture(dotG);
const parts = [];
function burst(x, y, tint, count = 18, speed = 220, size = 0.1, up = false) {
  for (let i = 0; i < count; i++) {
    const p = new PIXI.Sprite(dotTex);
    p.anchor.set(0.5); p.x = x; p.y = y; p.tint = tint;
    p.blendMode = PIXI.BLEND_MODES.ADD;
    const a = up ? -Math.PI / 2 + (Math.random() - 0.5) * 1.2 : Math.random() * 6.283;
    const v = speed * (0.3 + Math.random() * 0.8);
    p._vx = Math.cos(a) * v; p._vy = Math.sin(a) * v;
    p._life = 0.6 + Math.random() * 0.7; p._t = 0;
    p.scale.set(size * (0.5 + Math.random()));
    fxLayer.addChild(p); parts.push(p);
  }
}
app.ticker.add(() => {
  const dt = app.ticker.deltaMS / 1000;
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p._t += dt; p.x += p._vx * dt; p.y += p._vy * dt;
    p._vy += 260 * dt; p.alpha = clamp01(1 - p._t / p._life);
    if (p._t > p._life) { fxLayer.removeChild(p); p.destroy(); parts.splice(i, 1); }
  }
});
function txt(str, size, color, weight = '800', family = "'Segoe UI', system-ui, sans-serif") {
  const t = new PIXI.Text(str, {
    fontFamily: family, fontSize: size, fill: color, fontWeight: weight,
    align: 'center', dropShadow: true, dropShadowColor: 0x000000,
    dropShadowBlur: 8, dropShadowAlpha: 0.6, dropShadowDistance: 2,
  });
  t.anchor.set(0.5); t.resolution = 2;
  return t;
}
const MATH = "'Cambria Math', Cambria, Georgia, serif";

// ════════════════════════════════════════════════════════════════════
// 3) PLÁŽOVÁ KULISA + GRAF (sdílené renderery)
// ════════════════════════════════════════════════════════════════════
function buildBeach(c) {
  const g = new PIXI.Graphics(); c.addChild(g);
  // palmy jako kontejnery (kvůli houpání kolem paty)
  function palm(x, y, s, flip) {
    const w = new PIXI.Container(); w.x = x; w.y = y; w.scale.set(s * (flip ? -1 : 1), s);
    const pg = new PIXI.Graphics(); w.addChild(pg);
    // kmen
    pg.lineStyle(13, C.trunk, 1);
    pg.moveTo(0, 0); pg.quadraticCurveTo(18, -70, 44, -128);
    // listy
    pg.lineStyle(9, C.leaf, 1);
    const tip = { x: 44, y: -128 };
    [[-66, -38], [-48, -70], [-6, -84], [40, -76], [64, -44], [70, -10]].forEach(([dx, dy]) => {
      pg.moveTo(tip.x, tip.y);
      pg.quadraticCurveTo(tip.x + dx * 0.55, tip.y + dy - 16, tip.x + dx, tip.y + dy);
    });
    // kokosy
    pg.lineStyle(0); pg.beginFill(0x5b3a1a, 1);
    pg.drawCircle(tip.x - 8, tip.y + 8, 7); pg.drawCircle(tip.x + 9, tip.y + 11, 7);
    pg.endFill();
    c.addChild(w);
    return w;
  }
  const palms = [palm(78, 596, 1.05, false), palm(1208, 590, 0.92, true)];
  function render(t, o = {}) {
    const dark = o.dark || 0;     // 0..1 bouřka
    const sunset = o.sunset || 0; // 0..1 západ (outro)
    g.clear();
    // obloha — tři pásy
    const mix = (c1, c2, f) => {
      const r1 = (c1 >> 16) & 255, g1 = (c1 >> 8) & 255, b1 = c1 & 255;
      const r2 = (c2 >> 16) & 255, g2 = (c2 >> 8) & 255, b2 = c2 & 255;
      return (Math.round(lerp(r1, r2, f)) << 16) | (Math.round(lerp(g1, g2, f)) << 8) | Math.round(lerp(b1, b2, f));
    };
    const skyTop = mix(mix(0x1a2c52, 0x0d1220, dark), 0x351a4e, sunset * 0.7);
    const skyMid = mix(mix(0x3a4a7a, 0x141a2c, dark), 0x8a3a52, sunset * 0.8);
    const skyLow = mix(mix(0xc97b4a, 0x232a3a, dark), 0xd86a3a, sunset * 0.5);
    g.beginFill(skyTop, 1).drawRect(0, 0, 1280, 240).endFill();
    g.beginFill(skyMid, 1).drawRect(0, 240, 1280, 220).endFill();
    g.beginFill(skyLow, 1).drawRect(0, 460, 1280, 140).endFill();
    // slunce
    const sunY = lerp(118, 600, sunset);
    const sunA = (1 - dark) * (sunset > 0.92 ? clamp01((1 - sunset) * 12) : 1);
    if (sunA > 0) {
      g.beginFill(0xffd98a, 0.18 * sunA).drawCircle(1075, sunY, 86).endFill();
      g.beginFill(0xffce6b, 0.95 * sunA).drawCircle(1075, sunY, 46).endFill();
    }
    // bouřkový mrak
    if (dark > 0.05) {
      g.beginFill(0x1c2233, 0.9 * dark);
      g.drawEllipse(640, 110, 360, 70); g.drawEllipse(430, 140, 220, 55); g.drawEllipse(860, 140, 230, 55);
      g.endFill();
      if (o.lightning) {
        g.lineStyle(5, 0xfff3b0, o.lightning);
        g.moveTo(640, 165); g.lineTo(610, 250); g.lineTo(645, 255); g.lineTo(600, 360);
      }
    }
    // moře
    const seaCol = mix(mix(C.sea, 0x081826, dark), 0x4a2746, sunset * 0.5);
    g.beginFill(seaCol, 1).drawRect(0, 600, 1280, 120).endFill();
    // hladina s vlnkami
    g.lineStyle(4, mix(C.seaHi, 0x14283c, dark), 1);
    g.moveTo(0, 600);
    for (let x = 0; x <= 1280; x += 32) {
      g.lineTo(x, 600 + Math.sin(x * 0.045 + t * 1.7) * 5);
    }
    // odlesk slunce na moři
    if (sunA > 0 && dark < 0.4) {
      g.lineStyle(0); g.beginFill(0xffce6b, 0.12 * sunA);
      g.drawEllipse(1075, 640, 60 + 30 * Math.sin(t), 9);
      g.endFill();
    }
    // VLNA = kolo relaxací
    if (o.waveX != null) {
      const wx = o.waveX;
      g.lineStyle(0);
      g.beginFill(0x9fd9ff, 0.30);
      g.moveTo(wx - 130, 612);
      g.quadraticCurveTo(wx - 40, 470, wx, 462);
      g.quadraticCurveTo(wx + 50, 470, wx + 90, 612);
      g.closePath().endFill();
      g.beginFill(0xffffff, 0.85);
      g.drawCircle(wx, 466, 13); g.drawCircle(wx - 26, 478, 9); g.drawCircle(wx + 22, 480, 8);
      g.endFill();
      // pěna dole
      g.beginFill(0xdff3ff, 0.5).drawEllipse(wx - 10, 608, 110, 10).endFill();
    }
    // žraločí ploutev
    if (o.sharkX != null) {
      const sx = o.sharkX, sy = 612 + Math.sin(t * 3) * 4;
      g.lineStyle(0); g.beginFill(0x222c3e, 1);
      g.moveTo(sx - 26, sy); g.quadraticCurveTo(sx - 4, sy - 44, sx + 14, sy - 40);
      g.lineTo(sx + 26, sy); g.closePath().endFill();
    }
    // houpání palem
    palms.forEach((p, i) => { p.rotation = 0.05 * Math.sin(t * 0.9 + i * 2.1) * (1 + dark); });
    palms.forEach(p => { p.visible = !o.hidePalms; });
  }
  return { render };
}

function buildGraph(c, opts = {}) {
  const g = new PIXI.Graphics(); c.addChild(g);
  const labT = {}, nameT = {}, wT = [];
  for (const [id, P] of Object.entries(NODES)) {
    nameT[id] = txt(id, 22, 0x0b0e16, '900'); nameT[id].x = P.x; nameT[id].y = P.y; c.addChild(nameT[id]);
    labT[id] = txt('', 24, C.cyan, '900', MATH); labT[id].x = P.x; labT[id].y = P.y - 46; c.addChild(labT[id]);
  }
  EDGES.forEach((e, i) => {
    const A = NODES[e.a], B = NODES[e.b];
    const tt = txt(String(e.w), 21, e.w < 0 ? 0xff8585 : 0xeadfc4, '800', MATH);
    const dx = B.x - A.x, dy = B.y - A.y, l = Math.hypot(dx, dy);
    tt.x = (A.x + B.x) / 2 - dy / l * 22; tt.y = (A.y + B.y) / 2 + dx / l * 22;
    c.addChild(tt); wT.push(tt);
  });
  function render(t, st, o = {}) {
    g.clear();
    // ostrůvky
    for (const [id, P] of Object.entries(NODES)) {
      g.lineStyle(0);
      g.beginFill(C.sandDark, 1).drawEllipse(P.x, P.y + 30, 56, 16).endFill();
      g.beginFill(C.sand, 1).drawEllipse(P.x, P.y + 26, 50, 13).endFill();
    }
    // lehátko u s
    {
      const P = NODES.s;
      g.lineStyle(5, 0x9a6a3a, 1);
      g.moveTo(P.x - 46, P.y + 22); g.lineTo(P.x - 14, P.y - 4);
      g.moveTo(P.x - 40, P.y - 2); g.lineTo(P.x - 12, P.y + 22);
      g.lineStyle(0);
      [0xff6b6b, 0xffffff, 0xff6b6b].forEach((col, i) => {
        g.beginFill(col, 1);
        g.drawRect(P.x - 44 + i * 11, P.y - 8 - i * 5, 11, 9);
        g.endFill();
      });
    }
    // koktejl u t
    {
      const P = NODES.t;
      g.lineStyle(3, 0xdfe6f5, 1);
      g.moveTo(P.x + 34, P.y - 14); g.lineTo(P.x + 50, P.y - 14); g.lineTo(P.x + 42, P.y + 2); g.lineTo(P.x + 34, P.y - 14);
      g.moveTo(P.x + 42, P.y + 2); g.lineTo(P.x + 42, P.y + 14);
      g.lineStyle(2.5, 0xff6b6b, 1);
      g.moveTo(P.x + 44, P.y - 16); g.lineTo(P.x + 52, P.y - 30);
      g.lineStyle(0); g.beginFill(0x7bd96a, 1).drawCircle(P.x + 37, P.y - 17, 4).endFill();
    }
    // hrany — houpou se jak houpací sítě („hrany relaxují“)
    EDGES.forEach((e, i) => {
      const A = NODES[e.a], B = NODES[e.b];
      const sway = Math.sin(t * 1.4 + i * 1.3) * 7;
      const mx = (A.x + B.x) / 2, my = (A.y + B.y) / 2 + 16 + sway;
      const hot = o.flashE === i;
      const col = hot ? C.cyan : (o.pathGlow && pathHas(e) ? C.goldHi : C.dim);
      const wd = hot ? 6 : (o.pathGlow && pathHas(e) ? 5.5 : 3.5);
      g.lineStyle(wd, col, hot ? 1 : 0.9);
      g.moveTo(A.x, A.y);
      g.quadraticCurveTo(mx, my, B.x, B.y);
      // šipka
      const ux = B.x - mx, uy = B.y - my, ul = Math.hypot(ux, uy);
      const hx = B.x - ux / ul * 34, hy = B.y - uy / ul * 34, hs = 13;
      g.lineStyle(0); g.beginFill(col, 1);
      g.moveTo(hx, hy);
      g.lineTo(hx - ux / ul * hs - uy / ul * hs * 0.55, hy - uy / ul * hs + ux / ul * hs * 0.55);
      g.lineTo(hx - ux / ul * hs + uy / ul * hs * 0.55, hy - uy / ul * hs - ux / ul * hs * 0.55);
      g.closePath().endFill();
    });
    function pathHas(e) {
      for (let i = 0; i < BESTPATH.length - 1; i++) if (BESTPATH[i] === e.a && BESTPATH[i + 1] === e.b) return true;
      return false;
    }
    // uzly
    for (const [id, P] of Object.entries(NODES)) {
      g.lineStyle(0);
      g.beginFill(0x0b0e16, 1).drawCircle(P.x, P.y, 23).endFill();
      g.beginFill(id === 's' ? C.gold : 0xdfe6f5, 1).drawCircle(P.x, P.y, 19).endFill();
      labT[id].text = 'ℓ=' + fmtL(st.lab[id]);
      labT[id].style.fill = st.lab[id] === Infinity ? C.muted : (st.lab[id] < 0 ? 0xff8585 : C.cyan);
    }
  }
  return { render };
}

const scenes = [];
function scene(t0, t1, build) {
  const s = { t0, t1, st: null };
  s.init = () => { s.st = build(); sceneLayer.addChild(s.st.c); };
  s.update = (lt) => s.st && s.st.update(lt);
  s.destroy = () => { if (s.st) { sceneLayer.removeChild(s.st.c); s.st.c.destroy({ children: true }); s.st = null; } };
  scenes.push(s);
  return s;
}

// ── CHORUS factory: vlny 2–4 / klidná verze ──
function chorusScene(t0, t1, lines, mode) {
  scene(t0, t1, () => {
    const c = new PIXI.Container();
    const beach = buildBeach(c);
    const graph = buildGraph(c);
    const board = buildBoard(c);
    const cap = caption(c, '');
    const badge = txt('', 30, C.goldHi, '900', MATH); badge.x = 640; badge.y = 92; badge.alpha = 0; c.addChild(badge);
    // tabulka ℓ po kolech (mode 'table')
    let tableT = [];
    if (mode === 'table') {
      const ids = ['s', 'a', 'b', 'c', 't'];
      const hx = 380, hy = 120, cw = 105, chh = 44;
      ids.forEach((id, j) => { const h = txt(id, 22, C.gold, '900', MATH); h.x = hx + 100 + j * cw; h.y = hy; c.addChild(h); });
      const snap = [{ s: 0, a: 2, b: 1, c: 8, t: 8 }, { s: 0, a: 2, b: -1, c: 5, t: 6 }, { s: 0, a: 2, b: -1, c: 3, t: 4 }, FINAL];
      for (let r = 0; r < 4; r++) {
        const rl = txt('kolo ' + (r + 1), 19, C.muted, '700'); rl.x = hx; rl.y = hy + 44 + r * chh; rl.alpha = 0; c.addChild(rl);
        const row = [rl];
        ids.forEach((id, j) => {
          const v = txt(String(snap[r][id]), 21, snap[r][id] < 0 ? 0xff8585 : 0xffffff, '800', MATH);
          v.x = hx + 100 + j * cw; v.y = hy + 44 + r * chh; v.alpha = 0; c.addChild(v); row.push(v);
        });
        tableT.push(row);
      }
    }
    const fired = new Set();
    return { c, update(lt0) {
      const lt = lt0 + t0;
      const st = mode === 'waves' ? labelsAt(lt) : { lab: FINAL, waveX: null, flashE: -1, curRound: 4 };
      beach.render(lt, { waveX: st.waveX, sunset: mode === 'final' ? 0.25 : 0 });
      graph.render(lt, st, { flashE: st.flashE, pathGlow: mode !== 'waves' });
      board.render(st.curRound, st.waveX != null);
      // captions podle zpívaného řádku
      const li = lines.findIndex(([a, b]) => lt >= a && lt < b);
      const caps = [
        ['🌊 n−1 vln — každá přelije všechny hrany', C.cyan],
        ['po k vlnách: nejkratší cesty na ≤ k hran (věta o k-té iteraci)', C.goldHi],
        ['žádná cesta nemá víc než n−1 hran → po n−1 vlnách HOTOVO', C.green],
        ['Bellman & Ford · O(n·m) — žádný klam', C.gold],
      ];
      const ci = Math.max(0, Math.min(caps.length - 1, li < 2 ? li : li - (lines.length - caps.length) + (lines.length > 4 ? 1 : 0)));
      // jednodušeji: mapuj 1:1 když lines.length==4, jinak posuň
      const idx = lines.length === 4 ? Math.max(0, li) : Math.max(0, li);
      const cc = caps[Math.min(idx, 3)];
      if (li >= 0) { cap.text = cc[0]; cap.style.fill = cc[1]; }
      // badge „po kole k“ při vlnách
      if (mode === 'waves' && st.curRound > 0) {
        badge.alpha = 1;
        badge.text = `po kole ${st.curRound}: cesty ≤ ${st.curRound} hran`;
      } else badge.alpha = Math.max(0, badge.alpha - 0.04);
      // splashe
      if (mode === 'waves') {
        for (const w of WAVES) {
          if (w.r === 0) continue;
          for (const im of ROUNDS[w.r]) {
            const fT = w.t0 + (im.e + 0.6) / EDGES.length * (w.t1 - w.t0);
            if (lt > fT && lt < w.t1 + 1 && !fired.has('r' + w.r + im.e)) {
              fired.add('r' + w.r + im.e);
              burst(NODES[im.n].x, NODES[im.n].y - 46, C.cyan, 14, 200, 0.09, true);
            }
          }
        }
      }
      // table reveal
      if (mode === 'table') {
        tableT.forEach((row, r) => {
          const at = lines[Math.min(r, lines.length - 1)][0] + 0.4 + (r === 1 ? 1.2 : 0);
          const a = easeOut(ph(lt, at, at + 0.6));
          row.forEach(el => el.alpha = a);
          if (a > 0.5 && !fired.has('row' + r)) { fired.add('row' + r); burst(380, 164 + r * 44, C.goldHi, 10, 150, 0.07); }
        });
      }
      if (mode === 'final') {
        // zlatá kometa po nejkratší cestě s→a→b→c→t
        const segs = [];
        let total = 0;
        for (let i = 0; i < BESTPATH.length - 1; i++) {
          const A = NODES[BESTPATH[i]], B = NODES[BESTPATH[i + 1]];
          const l = Math.hypot(B.x - A.x, B.y - A.y); segs.push({ A, B, l, off: total }); total += l;
        }
        let d = (lt * 0.22 % 1) * total;
        for (const sgm of segs) {
          if (d <= sgm.off + sgm.l) {
            const f = (d - sgm.off) / sgm.l;
            burst(lerp(sgm.A.x, sgm.B.x, f), lerp(sgm.A.y, sgm.B.y, f), C.goldHi, 1, 30, 0.06);
            break;
          }
        }
      }
    } };
  });
}

// 6) PLAYER / KARAOKE / CONTROLS
// ════════════════════════════════════════════════════════════════════
const player = document.getElementById('player');
const subEl = document.getElementById('subtitle');
const bigplay = document.getElementById('bigplay');
const btnPlay = document.getElementById('btnPlay');
const btnRestart = document.getElementById('btnRestart');
const seek = document.getElementById('seek');
const tCur = document.getElementById('tCur');
const tDur = document.getElementById('tDur');

let curScene = null, lastLocal = -1, curLine = -1;
let lineWords = [];
function tokenize(html) {
  const out = []; let cur = ''; let inTag = false;
  for (const ch of html) {
    if (ch === '<') inTag = true;
    else if (ch === '>') inTag = false;
    if (ch === ' ' && !inTag) { if (cur) out.push(cur); cur = ''; }
    else cur += ch;
  }
  if (cur) out.push(cur);
  return out;
}
function buildKaraokeLine(li) {
  const [a, b, html] = LINES[li];
  const tokens = tokenize(html);
  const ww = SUNG.filter(w => w[0] >= a - 0.06 && w[0] < b && w[1] > w[0]);
  const pick = (i) => {
    if (!ww.length) {
      const step = (b - a) / tokens.length;
      return [a + step * i, a + step * (i + 1)];
    }
    const wi = tokens.length === 1 ? 0 : Math.round(i * (ww.length - 1) / (tokens.length - 1));
    return ww[wi];
  };
  subEl.innerHTML = tokens.map(tok =>
    `<span class="kw"><span class="wb">${tok}</span><span class="wf">${tok}</span></span>`).join(' ');
  const els = [...subEl.querySelectorAll('.kw')];
  lineWords = tokens.map((tok, i) => {
    const [t0, t1] = pick(i);
    return { t0, t1: Math.max(t1, t0 + 0.12), wf: els[i] ? els[i].querySelector('.wf') : null };
  });
}
function tick() {
  const t = player.currentTime;
  const s = scenes.find(sc => t >= sc.t0 && t < sc.t1) || scenes[scenes.length - 1];
  if (s !== curScene) { curScene && curScene.destroy(); curScene = s; s.init(); lastLocal = -1; }
  const localT = t - s.t0;
  if (localT < lastLocal - 0.05) { s.destroy(); s.init(); }
  s.update(localT);
  lastLocal = localT;
  const li = LINES.findIndex(([a, b]) => t >= a && t < b);
  if (li !== curLine) {
    curLine = li;
    if (li >= 0) buildKaraokeLine(li);
    else { subEl.innerHTML = ''; lineWords = []; }
    subEl.style.opacity = li >= 0 ? 1 : 0;
  }
  for (let i = 0; i < lineWords.length; i++) {
    const w = lineWords[i];
    if (!w.wf) continue;
    const nextStart = i + 1 < lineWords.length ? lineWords[i + 1].t0 : w.t1;
    let p;
    if (t >= Math.max(w.t1, nextStart)) p = 1;
    else p = clamp01((t - w.t0) / (w.t1 - w.t0));
    w.wf.style.width = (p * 100).toFixed(1) + '%';
  }
  if (!seekDragging) {
    seek.value = t;
    seek.style.setProperty('--p', (t / (player.duration || 179.1) * 100) + '%');
  }
  tCur.textContent = fmtTime(t);
  requestAnimationFrame(tick);
}
function fmtTime(t) { t = Math.max(0, t || 0); return `${Math.floor(t / 60)}:${String(Math.floor(t % 60)).padStart(2, '0')}`; }

let seekDragging = false;
seek.addEventListener('input', () => {
  seekDragging = true;
  player.currentTime = +seek.value;
  seek.style.setProperty('--p', (+seek.value / (player.duration || 179.1) * 100) + '%');
});
seek.addEventListener('change', () => { seekDragging = false; });
function togglePlay() { if (player.paused) player.play(); else player.pause(); }
player.addEventListener('play', () => { btnPlay.textContent = '⏸'; bigplay.classList.add('hidden'); });
player.addEventListener('pause', () => { btnPlay.textContent = '▶'; if (player.currentTime < 0.05 || player.ended) bigplay.classList.remove('hidden'); });
player.addEventListener('ended', () => { bigplay.classList.remove('hidden'); bigplay.querySelector('.hint').innerHTML = 'Ještě jednou?<small>R = od začátku</small>'; });
player.addEventListener('loadedmetadata', () => {
  seek.max = player.duration;
  tDur.textContent = fmtTime(player.duration);
});
btnPlay.addEventListener('click', togglePlay);
btnRestart.addEventListener('click', () => { player.currentTime = 0; player.play(); });
bigplay.addEventListener('click', () => { player.play(); });
document.getElementById('stage').addEventListener('click', (e) => {
  if (e.target.closest('#bigplay')) return;
  togglePlay();
});
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  else if (e.code === 'ArrowRight') player.currentTime = Math.min(player.duration || 179, player.currentTime + 5);
  else if (e.code === 'ArrowLeft') player.currentTime = Math.max(0, player.currentTime - 5);
  else if (e.key === 'r' || e.key === 'R' || e.code === 'Home') { player.currentTime = 0; player.play(); }
});
requestAnimationFrame(tick);
})();
